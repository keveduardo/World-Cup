}
function poolBracketHTML(){
  let html=`<div class="pool-bracket-top"><button class="pool-info-btn" onclick="poolToggleHelp()">ⓘ How the pool works</button></div>`;
  if(poolHelp) html+=poolHelpHTML();
  html+=poolChampionHTML();
  POOL_ROUNDS.forEach(({key,label})=>{
    const slots=KO_SCHEDULE[key]||[];
    const wt=POOL_WEIGHTS[key];
    html+=`<div class="pool-round-head"><h2>${label}</h2><span class="wt">${wt} pt${wt>1?'s':''} each</span></div>`;
    slots.slice().sort((a,b)=>a.n-b.n).forEach(s=>{ html+=poolSlotHTML(s); });
  });
  return html;
}
function poolLeaderboardHTML(){
  const adv=POOL_ADV||advancedSets();
  const actualChamp = adv.FINAL && adv.FINAL.size ? [...adv.FINAL][0] : '';
  let rows=[];
  const isAdmin = !!(poolBoard && poolBoard.admin);
  if(poolBoard && poolBoard.players){
    rows=poolBoard.players.map(p=>{ const s=poolScore(p,adv,actualChamp); return { name:p.name, champion:p.champion, avatar:p.avatar, code:p.code, ...s }; });
    rows.sort((a,b)=> b.pts-a.pts || b.correct-a.correct || a.name.localeCompare(b.name));
  }
  const adminBtn = isAdmin
    ? `<button class="pool-mini-btn" onclick="poolAdminExit()">🔓 Admin: exit</button>`
    : `<button class="pool-mini-btn" onclick="poolAdminUnlock()">🔧 Admin</button>`;
  let html=`<div class="pool-board pool-board-redesign"><div class="pool-board-head"><h3>Leaderboard</h3>`
    + `<div class="pool-board-actions">${adminBtn}<button class="pool-mini-btn" onclick="poolLoadBoard()">↻ Refresh</button></div></div>`;
  if(poolAdmin && !isAdmin) html+=`<div class="pool-admin-note">Admin code not accepted. <a class="pool-link" onclick="poolAdminUnlock()">Try again</a></div>`;
  if(isAdmin) html+=`<div class="pool-admin-note ok">Admin mode — you can remove members.</div>`;
  if(!rows.length){ return html+`<div class="pool-empty">No entries yet — be the first to lock in picks.</div></div>`; }
  html+=`<div class="lb-list">`;
  rows.forEach((r,i)=>{
    const me = r.name===poolName ? ' me' : '';
    const pos = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="lb-rank">${i+1}</span>`;
    const ch = r.champion ? `<span class="lb-champ">🏆 ${flag(r.champion)}</span>` : '';
    const rm = (isAdmin && r.code) ? `<button class="lb-remove" title="Remove ${poolEsc(r.name)}" data-code="${poolEsc(r.code)}" data-name="${poolEsc(r.name)}" onclick="poolRemove(this)">🗑</button>` : '';
    html+=`<div class="lb-row${me}"><div class="lb-pos">${pos}</div>`
      + `<div class="lb-ava">${CAV.svg(r.avatar,{size:46})}</div>`
      + `<div class="lb-name">${poolEsc(r.name)}${ch}</div>`
      + `<div class="lb-score"><span class="lb-pts">${r.pts}</span><small>pts · ${r.correct}✓</small></div>${rm}</div>`;
  });
  return html + `</div><div class="pool-hint">R32 1 · R16 2 · QF 4 · SF 8 · Final 16 · 3rd 4 · Champion +${POOL_CHAMP_BONUS}. Other players' picks reveal after each kickoff.</div></div>`;
}
function poolHeaderHTML(){
  const a=caGet();
  return `<div class="pool-hdr pool-hdr-redesign">`
    + `<div class="pool-hdr-id"><button class="pool-hdr-ava" onclick="poolSetSub('avatar')" title="Edit your player" aria-label="Edit your player">${CAV.svg(a,{size:50})}<span class="pool-hdr-ava-edit">✏️</span></button>`
      + `<div class="pool-hdr-l"><span class="pool-you">${poolEsc(poolName)} <button class="pool-name-edit" onclick="poolEditName()" title="Edit your name" aria-label="Edit your name">✏️</button></span>`
      + `<span class="pool-code">code: <b>${poolEsc(poolMe)}</b> <button class="pool-mini-btn" onclick="poolCopyCode()">copy</button></span></div></div>`
    + `<div class="pool-subtabs">`
    + `<button class="pool-st ${poolSub==='bracket'?'active':''}" onclick="poolSetSub('bracket')">Bracket</button>`
    + `<button class="pool-st ${poolSub==='leaderboard'?'active':''}" onclick="poolSetSub('leaderboard')">Leaderboard</button>`
    + `<button class="pool-st pool-st-player ${poolSub==='avatar'?'active':''}" onclick="poolSetSub('avatar')">🎨 Player</button></div>`
    + `<button class="pool-leave" onclick="poolLeave()">leave</button></div>`;
}
function poolJoinHTML(){
  if(poolJoinMode==='signup'){
    const a=caGet();
    return `<div class="pool-join pool-join-wide"><h3>🔮 Join the Pool</h3>`
      + `<p class="pool-join-sub">First time here? Enter the shared pool code, your name, and a personal code — that code is all you'll need to get back in later, even on a new device. Then build your player.</p>`
      + `<div class="pool-join-grid">`
        + `<div class="pool-join-ava"><div class="ca-stage sm">${CAV.svg(a,{size:150})}</div>`
          + `<button class="pool-mini-btn" onclick="caRandom()">🎲 Randomize</button>`
          + `<div class="pool-join-avahint">Fine-tune your player after you join.</div></div>`
        + `<div class="pool-join-form">`
          + `<label class="pool-field"><span>Pool code</span><input id="poolCodeInput" placeholder="shared family code" value="${poolEsc(poolPool)}"></label>`
          + `<label class="pool-field"><span>Your name</span><input id="poolNameInput" placeholder="e.g. Kevin" value="${poolEsc(poolName)}"></label>`
          + `<label class="pool-field"><span>Personal code <small>(required — this is your login)</small></span><input id="poolMeInput" placeholder="choose a code you'll remember" value="${poolEsc(poolMe)}"></label>`
          + `<div class="pool-remember">⚠️ <b>Write this down.</b> Your personal code is the only way back into your bracket — there's no password reset.</div>`
          + `<button class="pool-go" onclick="poolSignupSubmit()">Create my bracket</button>`
        + `</div></div>`
      + `<div class="pool-join-note">Already signed up? <a class="pool-link" onclick="poolSetJoinMode('login')">Log in with your personal code</a></div></div>`;
  }
  return `<div class="pool-join"><h3>🔮 Knockout Prediction Pool</h3>`
    + `<p class="pool-join-sub">Enter your personal code to open your bracket.</p>`
    + `<label class="pool-field"><span>Personal code</span><input id="poolMeInput" placeholder="your code" value="${poolEsc(poolMe)}"></label>`
    + `<button class="pool-go" onclick="poolLoginSubmit()">Open my bracket</button>`
    + `<div class="pool-join-note">New here? <a class="pool-link" onclick="poolSetJoinMode('signup')">Sign up</a> to join the pool.</div></div>`;
}
function renderPool(){
  const c=document.getElementById('view-pool');
  if(!c) return;
  if(!poolMe){ c.innerHTML=poolJoinHTML(); return; }
  POOL_ADV=advancedSets();
  POOL_R32FX=r32Fixtures();
  validateBracket();
  let mid;
  if(poolSub==='leaderboard') mid=poolLeaderboardHTML();
  else if(poolSub==='avatar') mid=caCustomizerHTML();
  else mid=poolBracketHTML();
  c.innerHTML = poolHeaderHTML() + mid;
}
async function poolInit(){
  if(poolMe){
    try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(poolMe)}`);
      const d=await r.json();
      if(d && d.entry){ poolPicks=d.entry.picks||{}; poolChampion=d.entry.champion||''; if(d.entry.name) poolName=d.entry.name; poolAvatar=CAV.norm(d.entry.avatar); }
    }catch(e){}
  }
  if(typeof currentView!=='undefined' && currentView==='pool') renderPool();
}
poolInit();


// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('clockTzLabel').textContent = tzLabel();
applyTheme();
setInterval(applyTheme, 60000); // re-check theme each minute
updateClock();
setInterval(updateClock, 1000);
refreshAll();
if (syncCode) syncLoad(); // pull cloud favorites if sync is on

// Live minute ticker: while a match is live and the schedule tab is showing,
// re-render every 20s so the clock label (1st Half 23', etc.) advances between
// the full data refreshes.
setInterval(() => {
  const anyLive = allMatches.some(m => matchStatus(m) === 'live');
  if (anyLive && currentView === 'schedule') renderSchedule();
}, 20000);

// Restore the last tab the user was on (defaults to schedule)
(function restoreLastTab() {
  const last = localStorage.getItem('wc_last_tab');
  if (last && last !== 'schedule') {
    if (last === 'pool') { showView('pool', null); return; }
    const tabs = document.querySelectorAll('.tab');
    for (const t of tabs) {
      if (t.getAttribute('onclick')?.includes(`'${last}'`)) { t.click(); break; }
    }
  }
})();
</script>
