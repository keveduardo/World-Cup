const POOL_WEIGHTS = { LAST_32:1, LAST_16:2, QUARTER_FINALS:4, SEMI_FINALS:8, THIRD_PLACE:4, FINAL:16 };
const POOL_CHAMP_BONUS = 10;
const POOL_ROUND_COUNT = { LAST_32:16, LAST_16:8, QUARTER_FINALS:4, SEMI_FINALS:2, THIRD_PLACE:1, FINAL:1 };
const POOL_ROUNDS = [
  { key:'LAST_32', label:'Round of 32' },
  { key:'LAST_16', label:'Round of 16' },
  { key:'QUARTER_FINALS', label:'Quarterfinals' },
  { key:'SEMI_FINALS', label:'Semifinals' },
  { key:'THIRD_PLACE', label:'Third Place' },
  { key:'FINAL', label:'🏆 Final' },
];

let poolPool     = localStorage.getItem('wc_pool_pool') || '';
let poolMe       = localStorage.getItem('wc_pool_me')   || '';
let poolName     = localStorage.getItem('wc_pool_name') || '';
let poolPicks    = {};      // { matchNumber: teamName }
let poolChampion = '';
let poolTiebreak = '';      // predicted TOTAL goals in the Final (string of an int) — tiebreaker
let poolBoard    = null;    // last leaderboard payload from the Worker
let poolSub      = 'bracket';
let poolHelp     = false;     // bracket "how it works" panel toggle
let poolAdmin    = localStorage.getItem('wc_pool_admin') || '';  // admin code word (server-verified)
let poolJoinMode = 'login';  // 'login' (personal code only) | 'signup' (full form)
let POOL_ADV     = null;    // advancedSets() cache, rebuilt each render
let POOL_ELIM    = {};      // { stage: Set } teams that LOST their match in that round
let POOL_DEAD    = new Set();// teams knocked out of the tournament (lost any KO match)
let POOL_R32FX   = {};      // { matchNumber: {home, away} } resolved R32 fixtures
let poolReveal   = {};      // { matchNumber: true } — bracket slots whose "Pool picks" panel is open
let poolPicksOpen= false;   // leaderboard "Who picked what" section expanded
let _poolSaveT   = null;
let _poolDirty   = false;   // unsaved local change pending (drives the exit-time beacon)
let _poolMyRank  = -1;      // my leaderboard index this render (for confetti)
let _poolTotalPlayers = 0;  // player count this render (for the "dead last" sad confetti)
let _poolChampWon= false;   // my champion won it all (for confetti)
let _poolConfetti= new Set();// confetti reasons already celebrated this session

function poolEsc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function roundOfMatch(n){ n=+n;
  if(n>=73&&n<=88) return 'LAST_32';
  if(n>=89&&n<=96) return 'LAST_16';
  if(n>=97&&n<=100) return 'QUARTER_FINALS';
  if(n>=101&&n<=102) return 'SEMI_FINALS';
  if(n===103) return 'THIRD_PLACE';
  if(n===104) return 'FINAL';
  return null;
}
function koSlot(n){ for(const k in KO_SCHEDULE){ const s=KO_SCHEDULE[k].find(x=>x.n===+n); if(s) return s; } return null; }
function poolKickMs(n){ const s=koSlot(n); return s ? new Date(etToUtcISO(s.date,s.et)).getTime() : Infinity; }
function matchLocked(n){ return Date.now() >= poolKickMs(n); }
function poolChampLockMs(){ let min=Infinity; KO_SCHEDULE.LAST_32.forEach(s=>{ min=Math.min(min, new Date(etToUtcISO(s.date,s.et)).getTime()); }); return min; }
function championLocked(){ return Date.now() >= poolChampLockMs(); }
// Tiebreaker (predicted total goals in the Final) is editable right up to the Final kickoff.
function tiebreakLocked(){ return Date.now() >= poolKickMs(104); }
function poolSetTiebreak(v){ if(tiebreakLocked()) { renderPool(); return; }
  v=String(v).replace(/[^0-9]/g,'').slice(0,2); poolTiebreak=v; savePoolSoon(); }
// Actual total goals scored in the Final (regulation + extra time), once it's played.
function poolFinalActualTotal(){
  const m=allMatches.find(x=>x.stage==='FINAL' && x.status==='FINISHED');
  if(!m) return null; const ft=m.score?.fullTime||{};
  return (typeof ft.home==='number' && typeof ft.away==='number') ? ft.home+ft.away : null;
}

// Resolve a group-placement descriptor like '2A' or '1E' to an actual team via standings.
function resolvePlacement(desc){
  const m=/^([12])([A-L])$/.exec(desc);
  if(m){ const rows=standingsMap[m[2]]; if(rows && rows[+m[1]-1]) return rows[+m[1]-1].team; }
  return null; // third-place descriptors (e.g. '3rd A/B/C/D/F') resolve via the fixture itself
}
// Resolve one R32 side descriptor to a team. Reuses the SAME logic the Knockout
// tab uses, so the pool bracket fills exactly when the Knockout tab does — including
// the best-eight third-place slots (Annex C), which the old version couldn't resolve.
function koSideTeam(desc, slot){
  if(/^3rd/i.test(desc||'')){
    const other=(slot.home===desc)?slot.away:slot.home;   // the "1X" winner this 3rd-place team faces
    const w=/^1([A-L])$/.exec((other||'').trim());
    return w ? resolveThirdForWinner(w[1]) : null;
  }
  return koClinchedTeam(desc);
}
// Map each R32 slot (73-88) to its real fixture once the bracket is seeded.
function r32Fixtures(){
  const out={};
  KO_SCHEDULE.LAST_32.forEach(slot=>{
    // 1) prefer the official API fixture, matched by kickoff time (as the Knockout tab does)
    const m=koMatchForSlot('LAST_32', slot);
    if(m && groupOfTeam(m.homeTeam?.name) && groupOfTeam(m.awayTeam?.name)){
      out[slot.n]={ home:m.homeTeam.name, away:m.awayTeam.name }; return;
    }
    // 2) otherwise resolve each side from the final standings / Annex C third-place table
    const h=koSideTeam(slot.home, slot), a=koSideTeam(slot.away, slot);
    if(h && a) out[slot.n]={ home:h, away:a };
  });
  return out;
}

// Candidate teams for a slot. R32 → real fixtures; later rounds → the player's own picks.
function slotCandidates(n){ n=+n;
  if(n>=73&&n<=88){ const f=POOL_R32FX[n]; return f ? [f.home, f.away] : null; }
  const slot=koSlot(n); if(!slot) return null;
  return [poolRef(slot.home), poolRef(slot.away)];
}
// Real result of a knockout match (once it's actually been played), so downstream
// slots can switch from the player's predicted advancer to the REAL one the moment
// the feeder game is decided.
function koActualWinner(n){
  const stage=roundOfMatch(n), slot=koSlot(n); if(!stage||!slot) return null;
  const m=koMatchForSlot(stage, slot);
  return (m && m.status==='FINISHED') ? (poolWinnerOf(m)||null) : null;
}
function koActualLoser(n){
  const stage=roundOfMatch(n), slot=koSlot(n); if(!stage||!slot) return null;
  const m=koMatchForSlot(stage, slot);
  if(!m || m.status!=='FINISHED') return null;
  const w=poolWinnerOf(m); if(!w) return null;
  const wc=canonName(w);
  return canonName(m.homeTeam?.name)===wc ? (m.awayTeam?.name||null) : (m.homeTeam?.name||null);
}
// A downstream slot's team: the REAL advancer once the feeder match is played,
// otherwise the player's own pick (the pre-fill). When the real result replaces a
// losing pre-fill, validateBracket drops any now-impossible downstream pick so the
// fresh, real match-up shows up empty to re-pick.
function poolRef(ref){ let m;
  if((m=/^W (\d+)$/.exec(ref))){ const n=+m[1]; return koActualWinner(n) || poolPicks[n] || null; }
  if((m=/^W SF(\d)$/.exec(ref))){ const n=m[1]==='1'?101:102; return koActualWinner(n) || poolPicks[n] || null; }
  if((m=/^L SF(\d)$/.exec(ref))){ const n=m[1]==='1'?101:102; return koActualLoser(n) || poolLoser(n); }
  return null;
}
function poolLoser(n){ const c=slotCandidates(n); const w=poolPicks[n]; if(!c||!w) return null; return c[0]===w?c[1]:(c[1]===w?c[0]:null); }

// Drop a pick only when its slot's two teams are KNOWN and the pick is neither
// (a real cascade after an upstream change). Never drop just because candidates
// aren't resolvable yet — on a cold render the match data may not have loaded, and
// dropping there would silently wipe valid picks (and they'd never re-appear).
function validateBracket(){
  for(let n=73;n<=104;n++){
    const p=poolPicks[n]; if(!p) continue;
    const c=slotCandidates(n);
    if(c && c[0] && c[1] && canonName(c[0])!==canonName(p) && canonName(c[1])!==canonName(p)) delete poolPicks[n];
  }
}

// ── results / scoring ──
function poolWinnerOf(m){
  const e=m._espn; if(e && e.advanceName) return e.advanceName;   // ESPN 'advance' flag — handles penalties
  const sc=m.score||{};
  if(sc.winner==='HOME_TEAM') return m.homeTeam?.name;
  if(sc.winner==='AWAY_TEAM') return m.awayTeam?.name;
  const p=sc.penalties;
  if(p && typeof p.home==='number' && typeof p.away==='number') return p.home>p.away ? m.homeTeam?.name : m.awayTeam?.name;
  const ft=sc.fullTime||{};
  if(typeof ft.home==='number' && typeof ft.away==='number' && ft.home!==ft.away) return ft.home>ft.away ? m.homeTeam?.name : m.awayTeam?.name;
  return null;
}
function advancedSets(){
  const adv={LAST_32:new Set(),LAST_16:new Set(),QUARTER_FINALS:new Set(),SEMI_FINALS:new Set(),THIRD_PLACE:new Set(),FINAL:new Set()};
  allMatches.forEach(m=>{ const st=m.stage; if(!adv[st]) return; if(m.status!=='FINISHED') return;
    const w=poolWinnerOf(m); if(w) adv[st].add(canonName(w)); });
  return adv;
}
function poolFinishedCount(stage){ return allMatches.filter(m=>m.stage===stage && m.status==='FINISHED').length; }
function poolRoundComplete(r){ return poolFinishedCount(r) >= POOL_ROUND_COUNT[r]; }
// Per-round losers + a tournament-wide "knocked out" set. Lets us mark a pick ✗ the
// moment its own match is decided, instead of waiting for the whole round to finish.
function koResultSets(){
  const elim={LAST_32:new Set(),LAST_16:new Set(),QUARTER_FINALS:new Set(),SEMI_FINALS:new Set(),THIRD_PLACE:new Set(),FINAL:new Set()};
  const dead=new Set();
  allMatches.forEach(m=>{ const st=m.stage; if(!elim[st] || m.status!=='FINISHED') return;
    const w=poolWinnerOf(m); if(!w) return; const wc=canonName(w);
    [m.homeTeam?.name, m.awayTeam?.name].forEach(nm=>{ if(nm){ const c=canonName(nm); if(c!==wc){ elim[st].add(c); dead.add(c); } } });
  });
  return { elim, dead };
}
// Grade one team for one slot: 'yes' if it won that round, 'no' once it's provably
// out, '' while undecided. Third place is special — its players are SF losers (in
// POOL_DEAD), so there we judge only by the third-place match itself.
function poolTeamResult(n, team){
  const r=roundOfMatch(n); if(!r || !team || !POOL_ADV) return '';
  const pc=canonName(team);
  if(POOL_ADV[r] && POOL_ADV[r].has(pc)) return 'yes';
  if(r==='THIRD_PLACE') return (POOL_ELIM.THIRD_PLACE && POOL_ELIM.THIRD_PLACE.has(pc)) ? 'no' : '';
  return POOL_DEAD.has(pc) ? 'no' : '';
}
function poolPickResult(n){
  const pick=poolPicks[n];
  if(!pick || !matchLocked(n)) return '';
  return poolTeamResult(n, pick);
}
function poolScore(p, adv, actualChamp){
  let pts=0, correct=0;
  for(const n in (p.picks||{})){ const r=roundOfMatch(n); if(!r) continue;
    if(adv[r] && adv[r].has(canonName(p.picks[n]))){ pts+=POOL_WEIGHTS[r]; correct++; } }
  if(actualChamp && p.champion && canonName(p.champion)===canonName(actualChamp)){ pts+=POOL_CHAMP_BONUS; correct++; }
  return { pts, correct };
}

// ── actions ──
function poolPick(n, team){ if(matchLocked(n)){ renderPool(); return; } poolPicks[n]=team; validateBracket(); renderPool(); savePoolSoon(); }
function poolSetChampion(v){ if(championLocked()){ renderPool(); return; } poolChampion=v; renderPool(); savePoolSoon(); }
function poolSetSub(s){ if(poolSub==='avatar' && s!=='avatar') flushPoolSave(); poolSub=s; renderPool(); if(s==='leaderboard') poolLoadBoard(); }
function poolCopyCode(){ try{ navigator.clipboard.writeText(poolMe); }catch(e){} }
function poolCopy(s){ try{ navigator.clipboard.writeText(s); }catch(e){} }
function poolEditName(){
  const v=prompt('Edit your display name:', poolName||'');
  if(v==null) return;
  const name=v.trim().slice(0,40);
  if(!name){ alert('Your name can\'t be empty.'); return; }
  if(name===poolName) return;
  poolName=name; localStorage.setItem('wc_pool_name', poolName);
  savePool();        // immediate upsert; worker updates the stored name
  renderPool();      // refresh header
  poolLoadBoard();   // refresh leaderboard so the new name shows there too
}
function poolLeave(){
  // Sign out on THIS browser only — server data is untouched, so logging back in
  // with the personal code restores everything. Lets a household share a device.
  if(!confirm('Sign out of the pool on this browser?\n\nYour picks are saved — log back in anytime with your personal code.')) return;
  flushPoolSave();   // flush any pending save for the current person first
  ['wc_pool_pool','wc_pool_me','wc_pool_name'].forEach(k=>localStorage.removeItem(k));
  poolPool=''; poolMe=''; poolName=''; poolPicks={}; poolChampion=''; poolBoard=null; poolAvatar=null; poolSub='bracket'; poolJoinMode='login';
  renderPool();
}
function savePoolSoon(ms){ _poolDirty=true; clearTimeout(_poolSaveT); _poolSaveT=setTimeout(savePool, ms||700); }
function flushPoolSave(){ if(_poolSaveT){ clearTimeout(_poolSaveT); _poolSaveT=null; savePool(); } }
function poolPicksStr(){ return Object.keys(poolPicks).filter(n=>poolPicks[n]).map(n=>n+':'+poolPicks[n]).join('|'); }
function poolSaveURL(){
  return `${PROXY}?type=poolsave&pool=${encodeURIComponent(poolPool)}&me=${encodeURIComponent(poolMe)}`
    +`&name=${encodeURIComponent(poolName)}&picks=${encodeURIComponent(poolPicksStr())}&champion=${encodeURIComponent(poolChampion)}`
    +`&tiebreak=${encodeURIComponent(poolTiebreak)}&avatar=${encodeURIComponent(JSON.stringify(poolAvatar||{}))}`;
}
function poolFlashSaved(){
  const el=document.getElementById('poolSaveFlash'); if(!el) return;
  el.textContent='Saved ✓'; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}
async function savePool(){
  if(!poolMe) return;
  // Clear the dirty flag only once the save is confirmed, so a tab closed mid-flight
  // still triggers the exit beacon rather than silently dropping the change.
  try{ await fetch(poolSaveURL()); _poolDirty=false; poolFlashSaved(); }catch(e){}
}
// Last-ditch save when the page is being hidden/closed: the debounced fetch may
// never run, so beacon the current state. The Worker merges and ignores any pick
// whose match has already kicked off, so this can't overwrite a locked pick.
function poolSaveBeacon(){
  if(!poolMe || !_poolDirty) return;
  clearTimeout(_poolSaveT); _poolSaveT=null;
  const url=poolSaveURL();
  try{ if(navigator.sendBeacon && navigator.sendBeacon(url)){ _poolDirty=false; return; } }catch(e){}
  try{ fetch(url, {keepalive:true}); _poolDirty=false; }catch(e){}
}
async function poolLoadBoard(){
  if(!poolMe) return;
  try{ const r=await fetch(`${PROXY}?type=poolboard&me=${encodeURIComponent(poolMe)}&pool=${encodeURIComponent(poolPool)}&admin=${encodeURIComponent(poolAdmin)}`);
    const d=await r.json(); if(d && d.players) poolBoard=d; }catch(e){}
  // Refresh whenever the board feeds the current view — the leaderboard's "who
  // picked what" and the bracket's per-match "Pool picks" both read poolBoard.
  if(currentView==='pool' && poolSub!=='avatar') renderPool();
}
function poolAdminUnlock(){
  const c=prompt('Enter the admin code word to manage members:');
  if(c==null) return;
  poolAdmin=c.trim(); localStorage.setItem('wc_pool_admin', poolAdmin);
  poolLoadBoard(); // board.admin in the response tells us if the code was accepted
}
function poolAdminExit(){ poolAdmin=''; localStorage.removeItem('wc_pool_admin'); poolLoadBoard(); }
function poolRemove(btn){
  const code=btn.dataset.code, name=btn.dataset.name;
  if(!code) return;
  if(!confirm('Remove "'+name+'" from the pool?\n\nThis permanently deletes their bracket and avatar. This cannot be undone.')) return;
  fetch(`${PROXY}?type=pooldelete&admin=${encodeURIComponent(poolAdmin)}&target=${encodeURIComponent(code)}`)
    .then(r=>r.json()).then(d=>{ if(d&&d.ok){ poolLoadBoard(); } else { alert('Could not remove member: '+((d&&d.error)||'error')); } })
    .catch(()=>alert('Network error removing member.'));
}
function poolSetJoinMode(m){ poolJoinMode=m; renderPool(); }
async function poolLoginSubmit(){
  const me=document.getElementById('poolMeInput').value.trim();
  if(!me){ alert('Enter your personal code.'); return; }
  let d;
  try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(me)}`); d=await r.json(); }
  catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(!d || !d.entry){ alert('No bracket found for that code. If you are new, tap “Sign up”.'); return; }
  poolMe=me; poolPool='';
  poolPicks=d.entry.picks||{}; poolChampion=d.entry.champion||''; poolName=d.entry.name||'';
  poolTiebreak=d.entry.tiebreak!=null?String(d.entry.tiebreak):'';
  poolAvatar=CAV.norm(d.entry.avatar);
  localStorage.setItem('wc_pool_me', poolMe);
  localStorage.setItem('wc_pool_name', poolName);
  localStorage.removeItem('wc_pool_pool');
  poolSub='bracket'; renderPool(); poolLoadBoard();
}
async function poolSignupSubmit(){
  const pool=document.getElementById('poolCodeInput').value.trim();
  const name=document.getElementById('poolNameInput').value.trim();
  const me=document.getElementById('poolMeInput').value.trim();
  if(!pool || !name || !me){ alert('Please fill in the pool code, your name, and a personal code.'); return; }
  // make sure the personal code isn't already taken
  let chk;
  try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(me)}`); chk=await r.json(); }
  catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(chk && chk.entry){ alert('That personal code is already in use. If it is yours, tap “Log in”; otherwise pick a different code.'); return; }
  // create the entry (Worker requires the pool code for a new entry)
  let res;
  try{
    const u=`${PROXY}?type=poolsave&pool=${encodeURIComponent(pool)}&me=${encodeURIComponent(me)}&name=${encodeURIComponent(name)}&picks=&champion=&avatar=${encodeURIComponent(JSON.stringify(CAV.norm(poolAvatar)))}`;
    res=await (await fetch(u)).json();
  }catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(!res || res.error){ alert('That pool code did not work. Double-check it with whoever set up the pool.'); return; }
  poolPool=pool; poolMe=me; poolName=name; poolPicks={}; poolChampion='';
  localStorage.setItem('wc_pool_me', poolMe);
  localStorage.setItem('wc_pool_name', poolName);
  localStorage.setItem('wc_pool_pool', poolPool);
  poolSub='bracket'; renderPool(); poolLoadBoard();
}

/* Copa avatar engine — vanilla SVG, copa-only.
 * Ports the @brisaloca/player-avatar look (same 120x170 coordinate system + the
 * 48 World Cup kits via CA_KITS) and adds grown-up / party / build axes for the
 * adult prediction pool. No React, no dependency on the shared kids' package.
 * Option arrays are APPEND-ONLY (saved avatars store indices). */
const CAV = (function () {
  const SKIN   = ["#F8D7C0", "#F1C39E", "#D99E73", "#B97A4E", "#8C5A33", "#5E3A1E"];
  const HAIRC  = ["#2B2620", "#5B3A1E", "#A6662E", "#E0B23C", "#BFC2C7", "#EDE6D6"];
  // APPEND-ONLY (saved avatars store indices — never reorder/remove).
  const HAIR   = ["bald", "buzz", "short", "receding", "mop", "manbun", "long", "mohawk", "ponytail", "pigtails", "bun", "afro"];
  const BEARD  = ["none", "stubble", "mustache", "goatee", "full"];
  const FACE   = ["smile", "grin", "cool", "shout"];
  const BUILD  = ["slim", "average", "beefy"];
  const HEIGHT = ["short", "average", "tall"];
  const OUTFIT = ["kit", "tee", "suit", "barechest", "boxers", "briefs", "speedo", "dress", "banana", "dino", "hero", "hotdog"];
  const BODY   = ["masc", "fem"];
  const FLAIR  = ["facepaint", "shades", "scarf", "buckethat", "pint", "foamfinger", "cape", "partyhat", "flowercrown", "propeller", "devilhalo", "jester", "vuvuzela", "flamingo", "churro", "maracas"];
  const LABEL = {
    hair: { bald: "Bald", buzz: "Buzz", short: "Short", receding: "Receding", mop: "Mop", manbun: "Man-bun", long: "Long", mohawk: "Mohawk", ponytail: "Ponytail", pigtails: "Pigtails", bun: "Top bun", afro: "Afro" },
    beard: { none: "Clean", stubble: "Stubble", mustache: "Mustache", goatee: "Goatee", full: "Full beard" },
    face: { smile: "Smile", grin: "Grin", cool: "Cool", shout: "Shout" },
    build: { slim: "Slim", average: "Average", beefy: "Beefy" },
    height: { short: "Short", average: "Average", tall: "Tall" },
    outfit: { kit: "Team kit", tee: "T-shirt", suit: "Suit", barechest: "Bare chest", boxers: "Boxer briefs", briefs: "Briefs", speedo: "Speedo", dress: "Dress", banana: "Banana suit", dino: "Dino onesie", hero: "Superhero", hotdog: "Hot dog" },
    body: { masc: "Masc", fem: "Fem" },
    flair: { facepaint: "Face paint", shades: "Sunglasses", scarf: "Scarf", buckethat: "Bucket hat", pint: "Pint", foamfinger: "Foam finger", cape: "Flag cape", partyhat: "Party hat", flowercrown: "Flower crown", propeller: "Propeller cap", devilhalo: "Horns & halo", jester: "Jester hat", vuvuzela: "Vuvuzela", flamingo: "Floaty flamingo", churro: "Churro", maracas: "Maracas" },
  };
  const OPTS = { SKIN, HAIRC, HAIR, BEARD, FACE, BUILD, HEIGHT, OUTFIT, BODY, FLAIR, LABEL };

  const DEFAULT = { v: 1, skin: 1, hairC: 0, hair: 2, beard: 0, face: 0, build: 1, height: 1, outfit: 0, body: 0, team: "bra", variant: "home", flair: [] };
  const teamIds = () => Object.keys(CA_KITS);

  function norm(a) {
    a = a && typeof a === "object" ? a : {};
    const cl = (v, arr) => { v = +v || 0; return v < 0 || v >= arr.length ? 0 : v; };
    const o = {
      v: 1,
      skin: cl(a.skin, SKIN), hairC: cl(a.hairC, HAIRC), hair: cl(a.hair, HAIR),
      beard: cl(a.beard, BEARD), face: cl(a.face, FACE), build: cl(a.build, BUILD),
      height: cl(a.height, HEIGHT), outfit: cl(a.outfit, OUTFIT), body: cl(a.body, BODY),
      team: CA_KITS[a.team] ? a.team : DEFAULT.team,
      variant: a.variant === "away" ? "away" : "home",
      flair: Array.isArray(a.flair) ? [...new Set(a.flair.filter(i => i >= 0 && i < FLAIR.length))] : [],
    };
    return o;
  }

  function kitOf(av) {
    const k = CA_KITS[av.team] || CA_KITS[DEFAULT.team];
    const arr = av.variant === "away" ? k.a : k.h;
    return { pattern: arr[0], primary: arr[1], secondary: arr[2], shorts: arr[3], socks: arr[4], trim: arr[5], flag: k.f, name: k.n };
  }

  function patternFills(p, primary, secondary) {
    if (p === "vstripes") {
      let s = `<rect x="36" y="70" width="48" height="46" fill="${primary}"/>`;
      [42, 54, 66, 78].forEach(x => (s += `<rect x="${x}" y="70" width="6" height="46" fill="${secondary}"/>`));
      return s;
    }
    if (p === "checkers") {
      let s = `<rect x="36" y="70" width="48" height="46" fill="${primary}"/>`;
      for (let i = 0; i < 6; i++) for (let j = 0; j < 6; j++) if ((i + j) % 2) s += `<rect x="${36 + i * 8}" y="${70 + j * 8}" width="8" height="8" fill="${secondary}"/>`;
      return s;
    }
    if (p === "halves") return `<rect x="36" y="70" width="24" height="46" fill="${primary}"/><rect x="60" y="70" width="24" height="46" fill="${secondary}"/>`;
    if (p === "sash") return `<rect x="36" y="70" width="48" height="46" fill="${primary}"/><path d="M36 100 L66 70 L80 70 L80 78 L48 116 L36 116 Z" fill="${secondary}"/>`;
    return `<rect x="36" y="70" width="48" height="46" fill="${primary}"/>`;
  }

  // hair drawn on top of head; `back` = strands behind head (long/mop)
  function hairBack(style, c) {
    if (style === "long") return `<g fill="${c}"><path d="M32 42 q-3 22 0 38 q1 6 7 5 q4 -1 3 -7 q-3 -16 1 -32 z"/><path d="M88 42 q3 22 0 38 q-1 6 -7 5 q-4 -1 -3 -7 q3 -16 -1 -32 z"/></g>`;
    if (style === "mop") return `<g fill="${c}"><path d="M31 40 q-3 16 -1 28 q3 3 6 0 q-2 -14 0 -26 z"/><path d="M89 40 q3 16 1 28 q-3 3 -6 0 q2 -14 0 -26 z"/></g>`;
    if (style === "ponytail") return `<g fill="${c}"><path d="M72 22 q18 6 16 40 q-1 14 -9 18 q-6 -2 -3 -11 q7 -22 -10 -41 z"/><ellipse cx="74" cy="22" rx="7" ry="5"/></g>`;
    if (style === "pigtails") return `<g fill="${c}"><ellipse cx="26" cy="58" rx="9" ry="16"/><ellipse cx="94" cy="58" rx="9" ry="16"/><circle cx="30" cy="40" r="5"/><circle cx="90" cy="40" r="5"/></g>`;
    if (style === "afro") return `<circle cx="60" cy="38" r="33" fill="${c}"/>`;
    return "";
  }
  function hairTop(style, c) {
    switch (style) {
      case "bald":     return `<path d="M40 26 q6 -10 20 -10 q14 0 20 10 q-10 -6 -20 -6 q-10 0 -20 6 z" fill="rgba(255,255,255,.16)"/>`;
      case "buzz":     return `<path d="M36 36 q0 -26 24 -26 q24 0 24 26 q-12 -8 -24 -8 q-12 0 -24 8 z" fill="${c}" opacity="0.9"/>`;
      case "short":    return `<path d="M34 38 q0 -28 26 -28 q26 0 26 28 q-10 -12 -26 -12 q-16 0 -26 12 z" fill="${c}"/>`;
      case "receding": return `<path d="M36 33 q5 -21 24 -21 q19 0 24 21 q-7 -7 -15 -7 q-3 5 -9 5 q-6 0 -9 -5 q-8 0 -15 7 z" fill="${c}"/>`;
      case "mop":      return `<path d="M30 41 q-3 -35 30 -35 q33 0 30 35 q-8 -13 -15 -11 q-6 -7 -15 -3 q-9 -4 -15 3 q-7 -2 -15 11 z" fill="${c}"/>`;
      case "manbun":   return `<g fill="${c}"><circle cx="60" cy="8" r="8"/><path d="M34 38 q0 -30 26 -30 q26 0 26 30 q-10 -12 -26 -12 q-16 0 -26 12 z"/></g>`;
      case "long":     return `<path d="M33 41 q0 -33 27 -33 q27 0 27 33 q-11 -13 -27 -13 q-16 0 -27 13 z" fill="${c}"/>`;
      case "mohawk":   return `<g fill="${c}"><path d="M40 24 q4 -6 20 -6 q16 0 20 6 q-10 -3 -20 -3 q-10 0 -20 3 z" opacity="0.35"/><path d="M53 4 q7 -4 14 0 l-2 26 h-10 z"/></g>`;
      case "ponytail": return `<g fill="${c}"><path d="M33 40 q0 -32 27 -32 q27 0 27 32 q-11 -12 -27 -12 q-16 0 -27 12 z"/><ellipse cx="73" cy="22" rx="6" ry="4" fill="#0003"/></g>`;
      case "pigtails": return `<path d="M33 39 q0 -31 27 -31 q27 0 27 31 q-11 -12 -27 -12 q-16 0 -27 12 z" fill="${c}"/><path d="M60 8 v22" stroke="#0003" stroke-width="2"/>`;
      case "bun":      return `<g fill="${c}"><circle cx="60" cy="5" r="10"/><circle cx="60" cy="5" r="10" fill="#0002"/><circle cx="60" cy="5" r="6" fill="${c}"/><path d="M34 38 q0 -31 26 -31 q26 0 26 31 q-10 -12 -26 -12 q-16 0 -26 12 z"/></g>`;
      case "afro":     return `<g fill="${c}"><circle cx="42" cy="20" r="14"/><circle cx="60" cy="11" r="16"/><circle cx="78" cy="20" r="14"/><circle cx="33" cy="34" r="12"/><circle cx="87" cy="34" r="12"/></g>`;
      default:         return "";
    }
  }

  function faceFeatures(face, isShades) {
    let eyes, mouth;

      eyes = `<g><rect x="42" y="38" width="36" height="9" rx="4" fill="#23272B"/><rect x="42" y="40" width="36" height="2" fill="#3a4a52" opacity=".6"/></g>`;
    } else if (face === "shout") {
      eyes = `<g><circle cx="50" cy="42" r="3.2" fill="#3A2A22"/><circle cx="70" cy="42" r="3.2" fill="#3A2A22"/><path d="M45 36 q5 -3 10 -1" stroke="#3A2A22" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M65 35 q5 -2 10 1" stroke="#3A2A22" stroke-width="2" fill="none" stroke-linecap="round"/></g>`;
    } else {
      eyes = `<g><circle cx="50" cy="43" r="3" fill="#3A2A22"/><circle cx="70" cy="43" r="3" fill="#3A2A22"/></g>`;
    }
    if (face === "grin") mouth = `<path d="M48 52 q12 12 24 0 q-12 4 -24 0 z" fill="#7A2E22"/><rect x="50" y="52" width="20" height="3" fill="#fff"/>`;
    else if (face === "shout") mouth = `<ellipse cx="60" cy="56" rx="8" ry="7" fill="#6e241b"/><ellipse cx="60" cy="53" rx="6" ry="2.5" fill="#fff"/>`;

// Champion options: only teams that can still win it. Once the full R32 field is
// seeded, that's the 32 knockout teams (excludes group-stage casualties) minus any
// later eliminations. Before the field is set, fall back to the full list so we
// never risk hiding a live team. Any already-saved pick is always kept selectable.
function poolChampList(){
  const fx=[]; for(let n=73;n<=88;n++){ if(POOL_R32FX[n]) fx.push(POOL_R32FX[n]); }
  let list;
  if(fx.length<16){ list=poolTeamList(); }
  else {
    const alive=new Set(); fx.forEach(f=>{ alive.add(f.home); alive.add(f.away); });
    list=[...alive].filter(t=>!POOL_DEAD.has(canonName(t))).sort();
  }
  if(poolChampion && !list.some(t=>canonName(t)===canonName(poolChampion))) list=[poolChampion, ...list];
  return list;
}

// Pickable-but-unmade picks: a slot you can act on now (teams known, not yet locked)
// that you haven't filled. Drives the "you're not done" nudge before kickoffs.
function poolOpenPicks(){
  const open=[];
  for(let n=73;n<=104;n++){
    if(matchLocked(n)) continue;
    const c=slotCandidates(n);
    if(c && c[0] && c[1] && !poolPicks[n]) open.push(n);
  }
  return open;
}
function poolFmtIn(ms){
  const diff=ms-Date.now(); if(diff<=0) return 'now';
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
  if(h>=24){ const d=Math.floor(h/24); return `${d}d ${h%24}h`; }
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}
function poolNudgeHTML(){
  const open=poolOpenPicks();
  const champOpen=!poolChampion && !championLocked();
  if(!open.length && !champOpen) return `<div class="pool-nudge done">✓ You're all set — every pick that's open right now is in.</div>`;
  let next=Infinity; open.forEach(n=>{ next=Math.min(next, poolKickMs(n)); });
  if(champOpen) next=Math.min(next, poolChampLockMs());
  const when=isFinite(next)
    ? `${new Date(next).toLocaleString('en-US',{timeZone:tz(),weekday:'short',hour:'numeric',minute:'2-digit'})} ${tzShort()} (in ${poolFmtIn(next)})`
    : '';
  const bits=[];
  if(open.length) bits.push(`<b>${open.length}</b> match${open.length!==1?'es':''}`);
  if(champOpen) bits.push(`your <b>champion</b>`);
  return `<div class="pool-nudge warn">⚠️ Still open: ${bits.join(' + ')}. Picks lock as games kick off${when?` — next at <b>${when}</b>`:''}.</div>`;
}
// Your running stake: points banked, how many of your teams are still alive, and
// the ceiling you could still reach. Banked matches what the leaderboard shows.
function poolMyStats(){
  let banked=0, potential=0;
  const grade=(team,r,wt)=>{ const pc=canonName(team);
    if(POOL_ADV[r] && POOL_ADV[r].has(pc)) banked+=wt;
    else if(!POOL_DEAD.has(pc)) potential+=wt; };
  for(const n in poolPicks){ const t=poolPicks[n]; if(!t) continue; const r=roundOfMatch(n); if(!r) continue; grade(t,r,POOL_WEIGHTS[r]); }
  if(poolChampion) grade(poolChampion,'FINAL',POOL_CHAMP_BONUS);
  const teams=new Set(Object.values(poolPicks).filter(Boolean).map(canonName));
  if(poolChampion) teams.add(canonName(poolChampion));
  let alive=0; teams.forEach(t=>{ if(!POOL_DEAD.has(t)) alive++; });
  return { pts:banked, max:banked+potential, alive };
}
function poolStatsHTML(){
  const s=poolMyStats();
  return `<div class="pool-stats">`
    + `<span class="ps-item"><b>${s.pts}</b> pts</span>`

    + `<span class="ps-item"><b>${s.max}</b> max possible</span></div>`;
}

function poolComposeRoast(row, statusKey, rows, i, offset){
  offset=offset||0;

  const day=Math.floor(Date.now()/86400000);

  const r=poolHash(name+statusKey)+day+done+offset;

    const above=rows[i-1], below=rows[i+1];

    if(rival){ const rel=(rival===above)?'behind':'ahead of';

}

// Per-row leaderboard flavor: badges + a roast line + an avatar topper.
function poolStandingsMeta(rows, baseline){
  const anyResults = allMatches.some(m=>POOL_ROUND_COUNT[m.stage] && m.status==='FINISHED');
  const maxCorrect = rows.reduce((a,r)=>Math.max(a,r.correct),0);
  let bestGain=0, worstDrop=0;
  if(baseline){ rows.forEach((r,i)=>{ const b=baseline[r.name]; if(b){ const g=b.rank-i; if(g>bestGain)bestGain=g; if(g<worstDrop)worstDrop=g; } }); }
  const perfectRounds = POOL_ROUNDS.map(x=>x.key).filter(r=> POOL_ROUND_COUNT[r]>=2 && poolFinishedCount(r)>=POOL_ROUND_COUNT[r]);
  const bustedCount=r=>{ const s=new Set(); for(const n in (r.picks||{})){ const t=r.picks[n]; if(t&&POOL_DEAD.has(canonName(t))) s.add(canonName(t)); } return s.size; };
  const aliveCount=r=>{ const s=new Set(Object.values(r.picks||{}).filter(Boolean).map(canonName)); if(r.champion)s.add(canonName(r.champion)); let c=0; s.forEach(t=>{ if(!POOL_DEAD.has(t))c++; }); return c; };
  const maxBusted=Math.max(0,...rows.map(bustedCount));
  const lucky=poolSoleUpsetCallers();
  const usedRoasts=new Set();   // no two rows show the same burn at once
  return rows.map((r,i)=>{
    const isLeader=anyResults && i===0 && (rows.length<2 || r.pts>rows[1].pts || r.correct>0);
    const isLast=anyResults && rows.length>1 && i===rows.length-1;
    const champDead=r.champion && POOL_DEAD.has(canonName(r.champion));
    const isHeater=baseline && bestGain>0 && baseline[r.name] && (baseline[r.name].rank-i)===bestGain;
    const isCold=baseline && worstDrop<0 && baseline[r.name] && (baseline[r.name].rank-i)===worstDrop;
    // Any movement (not just the biggest mover) earns a "moved up/down" burn.
    const gain=(baseline && baseline[r.name]) ? (baseline[r.name].rank - i) : 0;
    const movedUp=gain>0, movedDown=gain<0;
    const isOracle=maxCorrect>0 && r.correct===maxCorrect;
    const bc=bustedCount(r);
    const isClown=anyResults && bc>0 && bc===maxBusted;
    const isDead=anyResults && r.picks && Object.keys(r.picks).length>0 && aliveCount(r)===0;
    const isLucky=lucky.has(r.name);
    const b=[];
    if(isLeader) b.push(['👑','Pool leader']);
    if(isLast) b.push(['🥄','Wooden spoon — last place']);
    if(isOracle) b.push(['🔮','Oracle — most correct picks']);
    if(isHeater) b.push(['🚀','On a heater — biggest climb']);
    if(isCold) b.push(['🧊','Ice cold — biggest drop']);
    if(champDead) b.push(['🪦','Busted — champion eliminated']);
    if(isClown) b.push(['🤡','Clown — most busted picks']);
    if(isLucky) b.push(['🍀','Lucky duck — sole upset caller']);
    if(isDead) b.push(['💀','Dead bracket — nothing left alive']);
    if(r.picks){ for(const rd of perfectRounds){ const need=POOL_ROUND_COUNT[rd]; let got=0;
      for(const n in r.picks){ if(roundOfMatch(n)===rd && POOL_ADV[rd] && POOL_ADV[rd].has(canonName(r.picks[n]))) got++; }
      if(got>=need){ b.push(['🎯','Perfect '+rd.replace(/_/g,' ').toLowerCase()]); break; } } }
    const roastKey=isDead?'dead':champDead?'busted':isLeader?'leader':isLast?'last':movedUp?'heater':movedDown?'cold':isOracle?'oracle':'mid';
    const topper=isLeader?'👑':(isDead||champDead)?'💀':isLast?'🤡':'';
    return { badges:b, roast: anyResults?poolUniqueRoast(r, roastKey, rows, i, usedRoasts):'', topper };
  });
}

function poolStatusKeyFor(name){

  rows.sort((a,b)=> b.pts-a.pts || b.correct-a.correct || a.name.localeCompare(b.name));

}
function poolMaybeConfetti(){
  if(typeof currentView==='undefined' || currentView!=='pool') return;
  if(_poolChampWon && !_poolConfetti.has('champ')){ _poolConfetti.add('champ'); poolConfetti(); return; }
  const anyResults = allMatches.some(m=>POOL_ROUND_COUNT[m.stage] && m.status==='FINISHED');
  if(anyResults && _poolMyRank===0 && !_poolConfetti.has('lead')){ _poolConfetti.add('lead'); poolConfetti(); return; }
  // 🌧️ the comedic downgrade: champion busted, or dead last
  const champBust = poolChampion && POOL_DEAD.has(canonName(poolChampion));
  const deadLast = anyResults && _poolTotalPlayers>1 && _poolMyRank===_poolTotalPlayers-1;
  if((champBust||deadLast) && !_poolConfetti.has('sad')){ _poolConfetti.add('sad'); poolConfetti('sad'); }
}
function poolBracketHTML(){
  let html=`<div class="pool-bracket-top"><button class="pool-info-btn" onclick="poolToggleHelp()">ⓘ How the pool works</button></div>`;
  if(poolHelp) html+=poolHelpHTML();
  html+=poolUpsetHTML();
  html+=poolHoroscopeHTML();
  html+=poolSelfRoastHTML();
  html+=poolStatsHTML();
  html+=poolBusterHTML();
  html+=poolNudgeHTML();
  html+=poolChampionHTML();
  html+=poolTiebreakHTML();
  POOL_ROUNDS.forEach(({key,label})=>{
    const slots=KO_SCHEDULE[key]||[];
    const wt=POOL_WEIGHTS[key];
    html+=`<div class="pool-round-head"><h2>${label}</h2><span class="wt">${wt} pt${wt>1?'s':''} each</span></div>`;
    // Chronological (as played), not by bracket match-number.
    slots.slice().sort((a,b)=>poolKickMs(a.n)-poolKickMs(b.n)).forEach(s=>{ html+=poolSlotHTML(s); });
  });
  return html;
}
// "My bracket" — the player's predicted bracket as a scrollable tree, ✓/✗ as
// results land. Reuses the Knockout bracket layout; shows your pick on each side.
function poolMyTreeMatch(n){
  const c=slotCandidates(n), pick=poolPicks[n];
  const side=(team)=>{
    if(!team) return `<span class="bt-team tbd">TBD</span>`;
    const picked = pick && team===pick;
    const res = picked ? poolTeamResult(n,team) : '';
    const cls=['bt-team']; if(picked) cls.push('mine'); if(res==='yes') cls.push('won'); if(res==='no') cls.push('lost');
    const mark = res==='yes' ? ' ✓' : res==='no' ? ' ✗' : '';
    return `<span class="${cls.join(' ')}" data-team="${team.replace(/"/g,'&quot;')}">${flag(team)}<span class="bt-nm">${team}${mark}</span></span>`;
  };
  return `<div class="bt-match"><span class="bt-no">M${n}</span>${side(c?c[0]:null)}${side(c?c[1]:null)}</div>`;
}
function poolMyBracketHTML(){
  const key=koOrderKeys();
  const cols=[['LAST_32','R32'],['LAST_16','R16'],['QUARTER_FINALS','QF'],['SEMI_FINALS','SF'],['FINAL','🏆 Final']];
  let html=poolStatsHTML()
    + poolBusterHTML()
    + `<div class="bt-hint">Your predicted bracket — your pick highlighted, ✓/✗ as games finish. Scroll sideways →</div>`
    + `<div class="pool-champ" style="margin-bottom:12px"><div class="pool-champ-label">🏆 Your champion: ${poolChampion?flag(poolChampion)+' '+poolEsc(poolChampion):'<span style="color:var(--muted)">— none picked —</span>'}</div></div>`
    + `<div class="bt-scroll"><div class="bt-grid">`;
  cols.forEach(([stage,label])=>{
    const ms=(KO_SCHEDULE[stage]||[]).slice().sort((a,b)=>(key[a.n]??0)-(key[b.n]??0));
    html+=`<div class="bt-col"><div class="bt-colhead">${label}</div><div class="bt-colbody">`;
    ms.forEach(s=>{ html+=poolMyTreeMatch(s.n); });
    html+=`</div></div>`;
  });
  html+=`</div></div>`;
  const tp=(KO_SCHEDULE.THIRD_PLACE||[])[0];
  if(tp) html+=`<div class="bt-thirdwrap"><div class="bt-colhead">3rd place</div>${poolMyTreeMatch(tp.n)}</div>`;
  return html;
}
// Movement since the previous batch of results. We snapshot standings per results-
// state (count of finished knockout matches) in localStorage: while the state is
// unchanged the baseline stays put (so the arrows persist across views), and it
// advances only when new results actually land.
function poolMomentumBaseline(rows){
  const sig=allMatches.filter(m=>POOL_ROUND_COUNT[m.stage] && m.status==='FINISHED').length;
  const pid=(poolBoard && poolBoard.pool) || poolPool || '';
  const k='wc_pool_mv_'+pid;
  let stored=null; try{ stored=JSON.parse(localStorage.getItem(k)||'null'); }catch(e){}
  const cur={}; rows.forEach((r,i)=>{ cur[r.name]={pts:r.pts, rank:i}; });
  let baseline=null;
  if(stored && stored.sig===sig){ baseline=stored.prev; }
  else { baseline = stored ? stored.cur : null; }   // results advanced → last state becomes baseline
  try{ localStorage.setItem(k, JSON.stringify({ sig, prev: baseline, cur })); }catch(e){}
  return baseline;
}
function poolLeaderboardHTML(){
  const adv=POOL_ADV||advancedSets();
  const actualChamp = adv.FINAL && adv.FINAL.size ? [...adv.FINAL][0] : '';
  let rows=[];
  const isAdmin = !!(poolBoard && poolBoard.admin);
  const finalTotal=poolFinalActualTotal();
  const tbDelta=r=>(finalTotal==null || r.tiebreak==null || r.tiebreak==='') ? Infinity : Math.abs(+r.tiebreak - finalTotal);
  if(poolBoard && poolBoard.players){
    rows=poolBoard.players.map(p=>{ const s=poolScore(p,adv,actualChamp); return { name:p.name, champion:p.champion, tiebreak:p.tiebreak, picks:p.picks, avatar:p.avatar, code:p.code, ...s }; });
    // points → correct → closest Final-goals tiebreaker → name (alphabetical only as a last resort)
    rows.sort((a,b)=> b.pts-a.pts || b.correct-a.correct || (tbDelta(a)-tbDelta(b) || 0) || a.name.localeCompare(b.name));
  }
  const mvBaseline = rows.length ? poolMomentumBaseline(rows) : null;
  const meta = poolStandingsMeta(rows, mvBaseline);
  // remember my standing this render so confetti can fire on a win / 1st / last place
  const myI = rows.findIndex(r=>r.name===poolName);
  _poolMyRank = myI; _poolTotalPlayers = rows.length;
  _poolChampWon = !!(actualChamp && poolChampion && canonName(poolChampion)===canonName(actualChamp));
  const adminBtn = isAdmin
    ? `<button class="pool-mini-btn" onclick="poolAdminExit()">🔓 Admin: exit</button>`
    : `<button class="pool-mini-btn" onclick="poolAdminUnlock()">🔧 Admin</button>`;
  // Show which pool this board belongs to, capitalized (e.g. "family" → "Family").
  const poolNm = (poolBoard && poolBoard.pool) ? poolBoard.pool : '';
  const poolLbl = poolNm ? poolNm.charAt(0).toUpperCase()+poolNm.slice(1) : '';
  let html=`<div class="pool-board pool-board-redesign"><div class="pool-board-head"><h3>Leaderboard${poolLbl?` · ${poolEsc(poolLbl)}`:''}</h3>`
    + `<div class="pool-board-actions">${adminBtn}<button class="pool-mini-btn" onclick="poolLoadBoard()">↻ Refresh</button></div></div>`;
  html+=poolUpsetHTML();
  html+=poolRoastSpotlightHTML(rows, meta);
  if(poolAdmin && !isAdmin) html+=`<div class="pool-admin-note">Admin code not accepted. <a class="pool-link" onclick="poolAdminUnlock()">Try again</a></div>`;
  if(isAdmin) html+=`<div class="pool-admin-note ok">Admin mode — you can remove members.</div>`;
  if(!rows.length){ return html+`<div class="pool-empty">No entries yet — be the first to lock in picks.</div></div>`; }
  html+=`<div class="lb-list">`;
  rows.forEach((r,i)=>{
    const me = r.name===poolName ? ' me' : '';
    const pos = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="lb-rank">${i+1}</span>`;
    const ch = r.champion ? `<span class="lb-champ">🏆 ${flag(r.champion)}</span>` : '';
    const rm = (isAdmin && r.code) ? `<button class="lb-remove" title="Remove ${poolEsc(r.name)}" data-code="${poolEsc(r.code)}" data-name="${poolEsc(r.name)}" onclick="poolRemove(this)">🗑</button>` : '';
    const tb = (finalTotal!=null && r.tiebreak!=null && r.tiebreak!=='') ? ` · ⚖️${poolEsc(String(r.tiebreak))}` : '';
    const m = meta[i] || { badges:[], roast:'', topper:'' };
    const bdg = m.badges.map(([e,t])=>`<span class="lb-badge" title="${t}">${e}</span>`).join('');
    const top = m.topper ? `<span class="lb-topper">${m.topper}</span>` : '';
    // Copy-a-burn: grab this person's current burn for the group chat.
    const roast = m.roast
      ? `<div class="lb-roast">“${poolEsc(m.roast)}”<button class="lb-burncopy" title="Copy this burn" data-burn="${poolEsc(m.roast)}" onclick="poolCopy(this.dataset.burn)">📋</button></div>`
      : '';
    // Admin-only: show each member's personal code (their login) so you can recover
    // it for them. The Worker only sends codes to an authenticated admin.
    const codeLine = (isAdmin && r.code)
      ? `<span class="lb-code">🔑 <code data-code="${poolEsc(r.code)}">${poolEsc(r.code)}</code>`
        + `<button class="pool-mini-btn" data-code="${poolEsc(r.code)}" onclick="poolCopy(this.dataset.code)">copy</button></span>`
      : '';
    html+=`<div class="lb-row${me}"><div class="lb-pos">${pos}</div>`
      + `<div class="lb-ava">${top}${CAV.svg(r.avatar,{size:46})}</div>`
      + `<div class="lb-name">${poolEsc(r.name)}${bdg?` <span class="lb-badges">${bdg}</span>`:''}${ch}${roast}${codeLine}</div>`
      + `<div class="lb-score"><span class="lb-pts">${r.pts}</span><small>pts · ${r.correct}✓${tb}</small></div>${rm}</div>`;
  });
  const tbHint = finalTotal!=null ? ' Ties broken by closest Final-goals guess (⚖️).' : '';
  html += `</div><div class="pool-hint">R32 1 · R16 2 · QF 4 · SF 8 · Final 16 · 3rd 4 · Champion +${POOL_CHAMP_BONUS}. Other players' picks reveal after each kickoff.${tbHint}</div>`;
  return html + poolContrarianHTML() + poolCinderellaHTML() + poolChampDistHTML() + poolPicksSectionHTML() + `</div>`;
}
// Champion pick distribution — who the pool backed for the title. Champions are
// revealed by the Worker only after the champion lock (first R32 kickoff), so this
// stays empty until then. Marks ✓ on the eventual winner.
function poolChampDistHTML(){
  if(!poolBoard || !poolBoard.players) return '';
  const byCh=new Map();
  poolBoard.players.forEach(p=>{ if(!p.champion) return; if(!byCh.has(p.champion)) byCh.set(p.champion,[]); byCh.get(p.champion).push(p); });
  if(!byCh.size) return '';
  const actual = POOL_ADV && POOL_ADV.FINAL && POOL_ADV.FINAL.size ? [...POOL_ADV.FINAL][0] : '';
  const groups=[...byCh.entries()].sort((a,b)=> b[1].length-a[1].length || a[0].localeCompare(b[0]));
  const total=poolBoard.players.filter(p=>p.champion).length;
  let html=`<div class="pr-section"><div class="pr-section-h" style="cursor:default"><span>🏆 Champion picks</span><small>${total} in</small></div><div class="pr-wrap">`;
  groups.forEach(([team,ps])=>{
    const win = actual && canonName(team)===canonName(actual);
    const state = actual ? (win?'ok':'no') : '';
    const mark = win ? '<span class="pr-ok">✓</span>' : '';
    const people=ps.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(p=>
      `<span class="pr-person${p.name===poolName?' me':''}" title="${poolEsc(p.name)}">${CAV.svg(CAV.norm(p.avatar),{size:24})}<span class="pr-nm">${poolEsc(p.name)}</span></span>`).join('');
    html+=`<div class="pr-grp ${state}"><div class="pr-team"><span class="pf">${flag(team)}</span>`
      + `<span data-team="${poolEsc(team)}">${poolEsc(team)}</span>${mark}<span class="pr-cnt">${ps.length}</span></div>`
      + `<div class="pr-people">${people}</div></div>`;
  });
  return html+`</div></div>`;
}
function poolHeaderHTML(){
  const a=caGet();
  return `<div class="pool-hdr pool-hdr-redesign">`
    + `<div class="pool-hdr-id"><button class="pool-hdr-ava" onclick="poolSetSub('avatar')" title="Edit your player" aria-label="Edit your player">${CAV.svg(a,{size:50})}<span class="pool-hdr-ava-edit">✏️</span></button>`
      + `<div class="pool-hdr-l"><span class="pool-you">${poolEsc(poolName)} <button class="pool-name-edit" onclick="poolEditName()" title="Edit your name" aria-label="Edit your name">✏️</button></span>`
      + `<span class="pool-code">code: <b>${poolEsc(poolMe)}</b> <button class="pool-mini-btn" onclick="poolCopyCode()">copy</button></span></div></div>`
    + `<span id="poolSaveFlash" class="pool-save-flash"></span>`
    + `<div class="pool-subtabs">`
    + `<button class="pool-st ${poolSub==='bracket'?'active':''}" onclick="poolSetSub('bracket')">Picks</button>`
    + `<button class="pool-st ${poolSub==='mybracket'?'active':''}" onclick="poolSetSub('mybracket')">🗺 My bracket</button>`
    + `<button class="pool-st ${poolSub==='leaderboard'?'active':''}" onclick="poolSetSub('leaderboard')">Leaderboard</button>`
    + `<button class="pool-st pool-st-player ${poolSub==='avatar'?'active':''}" onclick="poolSetSub('avatar')">🎨 Player</button></div>`
    + `<button class="pool-leave" onclick="poolLeave()" title="Sign out on this browser — your picks stay saved">Sign out</button></div>`;
}
function poolJoinHTML(){
  if(poolJoinMode==='signup'){
    const a=caGet();
    return `<div class="pool-join pool-join-wide"><h3>🔮 Join the Pool</h3>`
      + `<p class="pool-join-sub">First time here? Enter the shared pool code, your name, and a personal code — that code is all you'll need to get back in later, even on a new device. Then build your player.</p>`
      + `<div class="pool-join-grid">`
        + `<div class="pool-join-ava"><div class="ca-stage sm">${CAV.svg(a,{size:150})}</div>`
          + `<button class="pool-mini-btn" onclick="caRandom()">🎲 Randomize</button>`
          + `<div class="pool-join-avahint">Fine-tune your player after you join.</div></div>`
        + `<div class="pool-join-form">`
          + `<label class="pool-field"><span>Pool code</span><input id="poolCodeInput" placeholder="shared family code" value="${poolEsc(poolPool)}"></label>`
          + `<label class="pool-field"><span>Your name</span><input id="poolNameInput" placeholder="e.g. Kevin" value="${poolEsc(poolName)}"></label>`
          + `<label class="pool-field"><span>Personal code <small>(required — this is your login)</small></span><input id="poolMeInput" placeholder="choose a code you'll remember" value="${poolEsc(poolMe)}"></label>`
          + `<div class="pool-remember">⚠️ <b>Write this down.</b> Your personal code is the only way back into your bracket — there's no password reset.</div>`
          + `<button class="pool-go" onclick="poolSignupSubmit()">Create my bracket</button>`
        + `</div></div>`
      + `<div class="pool-join-note">Already signed up? <a class="pool-link" onclick="poolSetJoinMode('login')">Log in with your personal code</a></div></div>`;
  }
  return `<div class="pool-join"><h3>🔮 Knockout Prediction Pool</h3>`
    + `<p class="pool-join-sub">Enter your personal code to open your bracket.</p>`
    + `<label class="pool-field"><span>Personal code</span><input id="poolMeInput" placeholder="your code" value="${poolEsc(poolMe)}"></label>`
    + `<button class="pool-go" onclick="poolLoginSubmit()">Open my bracket</button>`
    + `<div class="pool-join-note">New here? <a class="pool-link" onclick="poolSetJoinMode('signup')">Sign up</a> to join the pool.</div></div>`;
}
function renderPool(){
  const c=document.getElementById('view-pool');
  if(!c) return;
  if(!poolMe){ c.innerHTML=poolJoinHTML(); return; }
  POOL_ADV=advancedSets();
  const _kr=koResultSets(); POOL_ELIM=_kr.elim; POOL_DEAD=_kr.dead;
  POOL_R32FX=r32Fixtures();
  validateBracket();
  let mid;
  if(poolSub==='leaderboard') mid=poolLeaderboardHTML();
  else if(poolSub==='avatar') mid=caCustomizerHTML();
  else if(poolSub==='mybracket') mid=poolMyBracketHTML();
  else mid=poolBracketHTML();
  c.innerHTML = poolHeaderHTML() + mid;
  if(poolSub==='leaderboard') poolMaybeConfetti();   // 🎉 once per session on a win / 1st place
}
async function poolInit(){
  if(poolMe){
    try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(poolMe)}`);
      const d=await r.json();
      if(d && d.entry){ poolPicks=d.entry.picks||{}; poolChampion=d.entry.champion||''; poolTiebreak=d.entry.tiebreak!=null?String(d.entry.tiebreak):''; if(d.entry.name) poolName=d.entry.name; poolAvatar=CAV.norm(d.entry.avatar); }
    }catch(e){}
  }
  if(typeof currentView!=='undefined' && currentView==='pool') renderPool();
}
poolInit();


// ─── INIT ─────────────────────────────────────────────────────────────────────
// Broadcast theme — now the default look for everyone. Opt out of it (classic
// light/auto-dark theme) with ?broadcast=0. Purely cosmetic; per-URL, no memory.
(function(){
  try{
    if (new URLSearchParams(location.search).get('broadcast') !== '0')
      document.body.classList.add('broadcast');
  }catch(e){}
})();

document.getElementById('clockTzLabel').textContent = tzLabel();
applyTheme();
setInterval(applyTheme, 60000); // re-check theme each minute
updateClock();
setInterval(updateClock, 1000);
refreshAll();
if (syncCode) syncLoad(); // pull cloud favorites if sync is on

// Live minute ticker: while a match is live and the schedule tab is showing,
// re-render every 20s so the clock label (1st Half 23', etc.) advances between
// the full data refreshes.
setInterval(() => {
  const anyLive = allMatches.some(m => matchStatus(m) === 'live');
  if (!anyLive) return;
  if (currentView === 'schedule') renderSchedule();
  else if (currentView === 'knockout') renderKnockout();
  // Live scores stream into the pool too — refresh the pick/bracket views (not the
  // avatar builder or leaderboard, which shouldn't redraw while in use).
  else if (currentView === 'pool' && (poolSub === 'bracket' || poolSub === 'mybracket') && poolMe) renderPool();
}, 20000);

// Keep the pool bracket honest about locks even if the user just sits on it: every
// 30s re-render so matches/champion freeze the moment their kickoff passes, the
// countdown advances, and any newly-kicked-off "Pool picks" become available.
// (Picks/bracket only — the avatar builder shouldn't redraw underfoot.)
let _lbWasLive = false;
setInterval(() => {
  if (currentView !== 'pool' || !poolMe) return;
  if (poolSub === 'bracket' || poolSub === 'mybracket') { renderPool(); return; }
  // Leaderboard: re-fetch the board (standings/picks/burns come from the Worker) while
  // games are live, plus one final pull the tick after the last live game ends so the
  // closing standings + burns land without a manual refresh.
  if (poolSub === 'leaderboard') {
    const anyLive = allMatches.some(m => matchStatus(m) === 'live');
    if (anyLive || _lbWasLive) poolLoadBoard();
    _lbWasLive = anyLive;
  }
}, 30000);

// Don't lose a pick made moments before the tab is closed/backgrounded: the
// debounced save may not have fired yet, so flush it with a beacon on the way out.
window.addEventListener('pagehide', poolSaveBeacon);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') poolSaveBeacon();
});

// Restore the last tab the user was on (defaults to schedule)
(function restoreLastTab() {
  const last = localStorage.getItem('wc_last_tab');
  if (last && last !== 'schedule') {
    if (last === 'pool') { showView('pool', null); return; }
    const tabs = document.querySelectorAll('.tab');
    for (const t of tabs) {
      if (t.getAttribute('onclick')?.includes(`'${last}'`)) { t.click(); break; }
    }
  }
})();
</script>
