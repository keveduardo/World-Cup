}

// ─── HARDCODED GROUP-STAGE VENUES (API free tier omits venue data) ───────────
// Key: alphabetically sorted canonical team pair. Each pair plays once.
const NAME_CANON = {
  'USA':'United States','Korea Republic':'South Korea','Czech Republic':'Czechia',
  'Bosnia and Herzegovina':'Bosnia-Herzegovina',"Côte d'Ivoire":'Ivory Coast',
  'Turkey':'Türkiye','Congo DR':'DR Congo','Cabo Verde':'Cape Verde','Cape Verde Islands':'Cape Verde','Curacao':'Curaçao'
};
function canonName(n) { return NAME_CANON[n] || n; }

const STADIUMS = {
  MEX:['Estadio Azteca','Mexico City, MX'], GDL:['Estadio Akron','Guadalajara, MX'],
  MTY:['Estadio BBVA','Monterrey, MX'],     VAN:['BC Place','Vancouver, CA'],
  TOR:['BMO Field','Toronto, CA'],          SEA:['Lumen Field','Seattle, WA'],
  SF:["Levi's Stadium",'SF Bay Area, CA'],  LA:['SoFi Stadium','Los Angeles, CA'],
  DAL:['AT&T Stadium','Dallas, TX'],        HOU:['NRG Stadium','Houston, TX'],
  KC:['Arrowhead Stadium','Kansas City, MO'], ATL:['Mercedes-Benz Stadium','Atlanta, GA'],
  MIA:['Hard Rock Stadium','Miami, FL'],    BOS:['Gillette Stadium','Boston, MA'],
  NYNJ:['MetLife Stadium','NY/NJ'],         PHI:['Lincoln Financial Field','Philadelphia, PA']
};

// Stadium coordinates [lat, lon] for weather lookup. Indoor/retractable-roof
// venues flagged so we can note the roof.
const STADIUM_GEO = {
  MEX:[19.3029,-99.1505,false], GDL:[20.6818,-103.4628,false],
  MTY:[25.6693,-100.2443,false], VAN:[49.2768,-123.1119,true],
  TOR:[43.6332,-79.4185,false],  SEA:[47.5952,-122.3316,false],
  SF:[37.4030,-121.9700,false],  LA:[33.9535,-118.3392,true],
  DAL:[32.7473,-97.0945,true],   HOU:[29.6847,-95.4107,true],
  KC:[39.0489,-94.4839,false],   ATL:[33.7553,-84.4006,true],
  MIA:[25.9580,-80.2389,false],  BOS:[42.0909,-71.2643,false],
  NYNJ:[40.8135,-74.0745,false], PHI:[39.9008,-75.1675,false]
};

const PAIR_VENUES = {
  // Group A
  'Mexico|South Africa':'MEX','Czechia|South Korea':'GDL','Czechia|South Africa':'ATL',
  'Mexico|South Korea':'GDL','Czechia|Mexico':'MEX','South Africa|South Korea':'MTY',
  // Group B
  'Bosnia-Herzegovina|Canada':'TOR','Qatar|Switzerland':'SF','Bosnia-Herzegovina|Switzerland':'LA',
  'Canada|Qatar':'VAN','Canada|Switzerland':'VAN','Bosnia-Herzegovina|Qatar':'SEA',
  // Group C
  'Brazil|Morocco':'NYNJ','Haiti|Scotland':'BOS','Morocco|Scotland':'BOS',
  'Brazil|Haiti':'PHI','Brazil|Scotland':'MIA','Haiti|Morocco':'ATL',
  // Group D
  'Paraguay|United States':'LA','Australia|Türkiye':'VAN','Australia|United States':'SEA',
  'Paraguay|Türkiye':'SF','Türkiye|United States':'LA','Australia|Paraguay':'SF',
  // Group E
  'Curaçao|Germany':'HOU','Ecuador|Ivory Coast':'PHI','Germany|Ivory Coast':'TOR',
  'Curaçao|Ecuador':'KC','Ecuador|Germany':'NYNJ','Curaçao|Ivory Coast':'PHI',
  // Group F
  'Japan|Netherlands':'DAL','Sweden|Tunisia':'MTY','Netherlands|Sweden':'HOU',
  'Japan|Tunisia':'MTY','Japan|Sweden':'DAL','Netherlands|Tunisia':'KC',
  // Group G
  'Belgium|Egypt':'SEA','Iran|New Zealand':'LA','Belgium|Iran':'LA',
  'Egypt|New Zealand':'VAN','Egypt|Iran':'SEA','Belgium|New Zealand':'VAN',
  // Group H
  'Cape Verde|Spain':'ATL','Saudi Arabia|Uruguay':'MIA','Saudi Arabia|Spain':'ATL',
  'Cape Verde|Uruguay':'MIA','Cape Verde|Saudi Arabia':'HOU','Spain|Uruguay':'GDL',
  // Group I
  'France|Senegal':'NYNJ','Iraq|Norway':'BOS','France|Iraq':'PHI',
  'Norway|Senegal':'NYNJ','France|Norway':'BOS','Iraq|Senegal':'TOR',
  // Group J
  'Algeria|Argentina':'KC','Austria|Jordan':'SF','Argentina|Austria':'DAL',
  'Algeria|Jordan':'SF','Algeria|Austria':'KC','Argentina|Jordan':'DAL',
  // Group K
  'DR Congo|Portugal':'HOU','Colombia|Uzbekistan':'MEX','Portugal|Uzbekistan':'HOU',
  'Colombia|DR Congo':'GDL','Colombia|Portugal':'MIA','DR Congo|Uzbekistan':'ATL',
  // Group L
  'Croatia|England':'DAL','Ghana|Panama':'TOR','England|Ghana':'BOS',
  'Croatia|Panama':'TOR','England|Panama':'NYNJ','Croatia|Ghana':'PHI'
};

function lookupVenue(hn, an) {
  const key = [canonName(hn), canonName(an)].sort().join('|');
  const code = PAIR_VENUES[key];
  return code ? STADIUMS[code] : null; // [stadium, city]
}

function lookupVenueCode(m) {
  // Returns the stadium code (e.g. 'LA') for a match, group stage only
  const key = [canonName(m.homeTeam?.name || ''), canonName(m.awayTeam?.name || '')].sort().join('|');
  return PAIR_VENUES[key] || null;
}
// Stadium code for any match: knockout slot venue (by kickoff time) or the group-
// stage team-pair lookup. Used for both the match cards and the Next-Up weather.
function venueCodeFor(m) {
  if (m._koVenueCode) return m._koVenueCode;
  if (KO_SCHEDULE[m.stage]) {
    const want = new Date(m.utcDate).getTime();
    const slot = (KO_SCHEDULE[m.stage] || []).find(s => new Date(etToUtcISO(s.date, s.et)).getTime() === want);
    if (slot) return slot.v;
  }
  return lookupVenueCode(m);
}


// ─── FIFA WORLD RANKINGS (final pre-tournament, June 2026) ───────────────────
// Source: FIFA/Coca-Cola Men's World Ranking. Static for the tournament.
const FIFA_RANK = {
  'Argentina':1,'Spain':2,'France':3,'England':4,'Portugal':5,'Brazil':6,
  'Netherlands':7,'Belgium':8,'Germany':9,'Croatia':10,'Morocco':11,'Colombia':13,
  'Mexico':14,'Uruguay':15,'United States':17,'Switzerland':18,'Japan':19,
  'Senegal':20,'Iran':21,'Denmark':22,'Austria':23,'Ecuador':24,'Türkiye':25,
  'Australia':26,'Canada':28,'Egypt':32,'Algeria':33,'Norway':34,'Panama':35,
  'Sweden':37,
  'South Korea':36,'Ivory Coast':40,'Scotland':41,'Paraguay':42,'Tunisia':43,
  'Ghana':44,'Saudi Arabia':45,'Iraq':46,'DR Congo':47,'Qatar':48,'Czechia':49,
  'Cape Verde':70,'Uzbekistan':57,'Jordan':62,'Bosnia-Herzegovina':74,
  'South Africa':61,'New Zealand':86,'Curaçao':82,'Haiti':84
};

function fifaRank(name) {
  return FIFA_RANK[name] || FIFA_RANK[canonName(name)] || null;
}

// ─── STADIUM WEATHER (Open-Meteo, no key) ────────────────────────────────────
const weatherCache = {}; // code → {temp, code, roof, ts}

function wxIcon(code, isDay) {
  // Open-Meteo WMO weather codes → emoji
  if (code === 0) return isDay ? '☀️' : '🌙';
  if (code <= 2) return isDay ? '🌤️' : '☁️';
  if (code === 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌧️';
  if (code <= 86) return '🌨️';
  if (code <= 99) return '⛈️';
  return '🌡️';
}

// One fetch per stadium covers all of its matches and the whole 16-day window:
// we cache the raw hourly arrays plus current conditions, then resolve either the
// kickoff-hour forecast or a live "now" reading from that same bundle.
async function fetchVenueWx(code) {
  const geo = STADIUM_GEO[code];
  if (!geo) return null;
  const [lat, lon, roof] = geo;
  const cached = weatherCache[code];
  if (cached && Date.now() - cached.ts < 15 * 60000) return cached; // 15-min cache
  try {
    // Proxied through our Worker (same-origin-ish) so the browser makes no direct
    // third-party request; the Worker fixes the upstream params and edge-caches.
    const url = `${PROXY}?type=weather&lat=${lat}&lon=${lon}`;
    const res = await fetch(url);
    const data = await res.json();
    const cur = data.current ? {
      temp: Math.round(data.current.temperature_2m),
      wcode: data.current.weather_code,
      isDay: data.current.is_day === 1,
    } : null;
    const result = {
      cur, roof, ts: Date.now(),
      offset: data.utc_offset_seconds || 0,   // venue tz: hourly times are venue-local
      times: data.hourly?.time || [],
      temps: data.hourly?.temperature_2m || [],
      codes: data.hourly?.weather_code || [],
    };
    weatherCache[code] = result;
    return result;
  } catch(e) { return null; }
}

// Forecast for the hour nearest kickoff. Returns null when kickoff falls outside
// the fetched window (closest hour > ~90 min off) so we never show a stray temp.
function wxAtKickoff(b, whenISO) {
  if (!b || !b.times.length) return null;
  const target = new Date(whenISO).getTime();
  // Hourly times are venue-local without an offset; convert each to a true UTC
  // instant via the venue's utc_offset so matching is independent of the viewer's tz.
  let bestI = 0, bestDiff = Infinity;
  b.times.forEach((t, i) => {
    const utcMs = Date.parse(t + 'Z') - b.offset * 1000;
    const diff = Math.abs(utcMs - target);
    if (diff < bestDiff) { bestDiff = diff; bestI = i; }
  });
  if (bestDiff > 90 * 60000) return null;
  const localHour = new Date(b.times[bestI] + 'Z').getUTCHours(); // venue-local hour
  const isDay = localHour >= 7 && localHour < 19;
  return { temp: Math.round(b.temps[bestI]), icon: wxIcon(b.codes[bestI], isDay), roof: b.roof };
}

// Current conditions right now at the venue (game-day / live matches).
function wxNow(b) {
  if (!b || !b.cur) return null;
  return { temp: b.cur.temp, icon: wxIcon(b.cur.wcode, b.cur.isDay), roof: b.roof };
}

// Fill weather into every slot the renderers emitted. data-wx-mode picks the
// reading: "now" for live/game-day cards, "forecast" for everything further out.
async function loadMatchWeather() {
  const els = document.querySelectorAll('[data-wx-code][data-wx-when]');
  for (const el of els) {
    const code = el.getAttribute('data-wx-code');
    const whenISO = el.getAttribute('data-wx-when');
    const mode = el.getAttribute('data-wx-mode') || 'forecast';
    const b = await fetchVenueWx(code);
    const wx = mode === 'now' ? wxNow(b) : wxAtKickoff(b, whenISO);
    if (!wx) continue;
    const tag = mode === 'now' ? ' · now' : '';
    el.innerHTML = wx.roof
      ? `${wx.icon} ${wx.temp}°F${tag} · 🏟 roof`
      : `${wx.icon} ${wx.temp}°F${tag}`;
  }
}

function matchVenueText(m) {
  let venue = m.venue || '';
  let city = venueCity(venue);
  if (!venue) {
    const hc = lookupVenue(m.homeTeam?.name || '', m.awayTeam?.name || '');
    if (hc) { venue = hc[0]; city = hc[1]; }
  }
  return [venue, city].filter(Boolean).join(' · ');
}


// ─── STATE ────────────────────────────────────────────────────────────────────
let allMatches   = [];
let standingsMap = {}; // group letter → sorted rows
let activeFilter = 'all';
let groupsOpen = false;   // group filter grid collapsed by default
let scheduleSections = { past: false, future: false }; // collapsed by default
let refreshTimer = null;
let currentView  = 'schedule';
let nextKickoff  = null; // for countdown

// ─── TIMEZONE PREFERENCE (defaults to device timezone) ───────────────────────
const TZ_OPTIONS = [
  { id: 'auto',                label: 'My device' },
  { id: 'America/Los_Angeles', label: 'Pacific' },
  { id: 'America/Denver',      label: 'Mountain' },
  { id: 'America/Phoenix',     label: 'Arizona' },
  { id: 'America/Chicago',     label: 'Central' },
  { id: 'America/New_York',    label: 'Eastern' },
];

// First-time visitors default to their device timezone; manual choice persists.
let userTZ = localStorage.getItem('wc_tz') || 'auto';

function tzLabel() {
  // For 'auto', show the live abbreviation (e.g. "Eastern (EDT)"); else the named label
  if (userTZ === 'auto') {
    const abbr = tzShort();
    return abbr ? abbr + ' (device)' : 'Device Time';
  }
  return (TZ_OPTIONS.find(o => o.id === userTZ)?.label || 'Pacific') + ' Time';
}

function tz() {
  return userTZ === 'auto'
    ? Intl.DateTimeFormat().resolvedOptions().timeZone
    : userTZ;
}

function tzShort() {
  // Derive the live abbreviation, e.g. "PDT", "MDT", "EST"
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz(), timeZoneName: 'short'
    }).formatToParts(new Date());
    return parts.find(p => p.type === 'timeZoneName')?.value || '';
  } catch(e) { return ''; }
}

function setTZ(id) {
  userTZ = id;
  localStorage.setItem('wc_tz', id);
  document.getElementById('clockTzLabel').textContent = tzLabel();
  applyTheme();
  renderCurrentView();
  updateClock();
  if (syncCode) syncSave();
}

// ─── FAVORITES ───────────────────────────────────────────────────────────────
let favorites = new Set(JSON.parse(localStorage.getItem('wc_favs') || '[]'));
let syncCode  = localStorage.getItem('wc_sync_code') || '';

function saveFavsLocal() {
  localStorage.setItem('wc_favs', JSON.stringify([...favorites]));
}

function isFav(name) { return favorites.has(name); }

function favMark(name) { return isFav(name) ? ' <span class="fav-star">★</span>' : ''; }

async function toggleFav(name) {
  if (favorites.has(name)) favorites.delete(name);
  else favorites.add(name);
  saveFavsLocal();
  renderCurrentView();
  if (syncCode) syncSave(); // push to cloud if sync enabled
}

// ── Cross-device sync via the Apps Script proxy ──
async function syncSave() {
  try {
    await fetch(`${PROXY}?type=favsave&code=${encodeURIComponent(syncCode)}&teams=${encodeURIComponent([...favorites].join('|'))}&tz=${encodeURIComponent(userTZ)}`);
  } catch(e) { /* silent — local copy is the source of truth */ }
}

async function syncLoad() {
  try {
    const res = await fetch(`${PROXY}?type=favload&code=${encodeURIComponent(syncCode)}`);
    const data = await res.json();
    if (data.teams && Array.isArray(data.teams)) {
      data.teams.forEach(t => favorites.add(t));
      saveFavsLocal();
    }
    if (data.tz && TZ_OPTIONS.some(o => o.id === data.tz)) {
      userTZ = data.tz;
      localStorage.setItem('wc_tz', userTZ);
    }
    syncSave(); // write the merged set back
    renderCurrentView();
  } catch(e) { /* ignore */ }
}

function setupSync() {
  const code = prompt(
    syncCode
      ? `Sync is ON (code: ${syncCode}).\nEnter a new code, or leave blank to turn sync off.`
      : 'Make up a sync code (e.g. kevin-wc26).\nUse the same code on your other devices to share favorites.'
  );
  if (code === null) return; // cancelled
  syncCode = code.trim();
  if (syncCode) {
    localStorage.setItem('wc_sync_code', syncCode);
    syncLoad();
    alert(`Sync enabled with code "${syncCode}".\nEnter the same code on your other devices.`);
  } else {
    localStorage.removeItem('wc_sync_code');
    alert('Sync turned off. Favorites stay on this device only.');
  }
}

// ─── DARK MODE (auto: dark 8pm–7am Pacific) ──────────────────────────────────
function applyTheme() {
  const hour = parseInt(new Date().toLocaleString('en-US', {
    timeZone: tz(), hour: 'numeric', hour12: false
  }), 10);
  // Broadcast follows the clock: a bright "daytime pitch" look by day, the dark
  // broadcast look at night (8pm–7am). Non-broadcast users get normal auto dark too.
  const dark = (hour >= 20 || hour < 7);
  document.body.classList.toggle('dark', dark);
}

// ─── FETCH HELPERS ────────────────────────────────────────────────────────────
async function proxyFetch(type) {
  const res = await fetch(`${PROXY}?type=${type}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadMatches() {
  const data = await proxyFetch('matches');
  allMatches = data.matches || [];
}

async function loadStandings() {
  const data = await proxyFetch('standings');
  standingsMap = {};
  let fallbackIdx = 0;
  const fallbackLetters = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const allRows = []; // collect every row in case we need to re-bucket

  (data.standings || []).forEach(group => {
    if (group.type && group.type !== 'TOTAL') return;

    const raw = String(group.group || group.name || group.stage || '');
    let letter = null;
    let m = raw.match(/GROUP[_\s]*([A-L])\b/i) || raw.match(/^([A-L])$/i) || raw.match(/\b([A-L])\s*$/i);
    if (m) letter = m[1].toUpperCase();
    if (!letter) letter = fallbackLetters[fallbackIdx] || '?';
    fallbackIdx++;

    if (!group.table || !group.table.length) return;

    const rows = group.table.map(row => ({
      team: row.team?.name || row.team?.shortName || 'TBD',
      mp:   row.playedGames ?? 0,
      w:    row.won ?? 0, d: row.draw ?? 0, l: row.lost ?? 0,
      gf:   row.goalsFor ?? 0, ga: row.goalsAgainst ?? 0,
      gd:   row.goalDifference ?? 0,
      pts:  row.points ?? 0,
      pos:  row.position ?? 0
    }));
    standingsMap[letter] = rows;
    allRows.push(...rows);
  });

  // VALIDATION: a real group has exactly 4 teams. If the API returned one
  // giant table (or any group with >4 teams), re-bucket every row into its
  // correct group using the official draw mapping.
  const malformed = Object.values(standingsMap).some(rows => rows.length > 4);
  if (malformed && allRows.length > 0) {
    standingsMap = {};
    allRows.forEach(r => {
      const letter = groupOfTeam(r.team);
      if (!letter) return;
      if (!standingsMap[letter]) standingsMap[letter] = [];
      standingsMap[letter].push(r);
    });
    // Sort each rebuilt group by points, GD, GF
    Object.keys(standingsMap).forEach(letter => {
      standingsMap[letter].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    });
  }
}


// ─── ESPN LIVE OVERLAY (real-time scores + match clock) ──────────────────────
async function loadEspnLive() {
  try {
    const data = await proxyFetch('espn');
    const events = data.events || [];
    if (!events.length) return;

    // Build lookup: sorted canonical team pair → espn live info
    const espnMap = {};
    events.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const home = comp.competitors?.find(c => c.homeAway === 'home');
      const away = comp.competitors?.find(c => c.homeAway === 'away');
      if (!home || !away) return;
      const key = [canonName(home.team?.displayName || ''), canonName(away.team?.displayName || '')].sort().join('|');
      const st = ev.status || comp.status || {};
      const bc = (comp.broadcasts?.[0]?.names || comp.geoBroadcasts?.map(g => g.media?.shortName) || []).filter(Boolean);
      espnMap[key] = {
        id: ev.id,                                   // event id for summary calls
        state: st.type?.state,                       // 'pre' | 'in' | 'post'
        desc: st.type?.description || '',            // 'Halftime', 'Full Time'...
        detail: st.type?.detail || '',               // longer phrase, helps disambiguate ET/pens
        clock: st.displayClock || '',                // "75'"
        startISO: ev.date || '',                     // ESPN's (possibly rescheduled) kickoff
        period: st.period || 0,
        homeScore: parseInt(home.score, 10),
        awayScore: parseInt(away.score, 10),
        shHome: (home.shootoutScore != null) ? parseInt(home.shootoutScore, 10) : undefined,
        shAway: (away.shootoutScore != null) ? parseInt(away.shootoutScore, 10) : undefined,
        homeForm: home.form || '',                   // "WWWDD"
        awayForm: away.form || '',
        broadcast: [...new Set(bc)].slice(0,3).join(', '),
        attendance: comp.attendance || 0,
        venueName: comp.venue?.fullName || ''
      };
      // capture who advanced (knockout scoring; ESPN 'advance' handles penalties)
      if (st.type?.state === 'post') {
        const hAdv = home.advance === true || (home.advance === undefined && home.winner === true);
        const aAdv = away.advance === true || (away.advance === undefined && away.winner === true);
        espnMap[key].advanceName = hAdv ? canonName(home.team?.displayName || '')
                                 : aAdv ? canonName(away.team?.displayName || '') : '';
      }
    });

    // Merge into allMatches
    allMatches.forEach(m => {
      const key = [canonName(m.homeTeam?.name || ''), canonName(m.awayTeam?.name || '')].sort().join('|');
      const e = espnMap[key];
      if (!e) return;
      // Only trust ESPN within ±1 day of the scheduled match (pairs are unique
      // in groups; knockout rematches are months apart so this is safe)
      if (Math.abs(new Date(m.utcDate) - Date.now()) > 36 * 3600 * 1000) return;

      if (e.state === 'in') {
        m.status = /half\s*time|halftime/i.test(e.desc) ? 'PAUSED' : 'IN_PLAY';
      } else if (e.state === 'post') {
        m.status = 'FINISHED';
      }
      if (!isNaN(e.homeScore) && !isNaN(e.awayScore) && e.state !== 'pre') {
        m.score = m.score || {};
        m.score.fullTime = { home: e.homeScore, away: e.awayScore };
      }
      m._espn = e;        // clock + ids + form + broadcast
      m._espnId = e.id;   // shortcut for summary fetch
    });
  } catch(err) { /* ESPN unavailable — football-data values remain */ }
}

// ─── REFRESH LOGIC ───────────────────────────────────────────────────────────
async function refreshAll() {
  const statusEl = document.getElementById('apiStatus');
  try {
    // Fire all three fetches in parallel. Render as soon as matches land so the
    // page isn't blocked waiting on the slowest call.
    const matchesP   = loadMatches();
    const standingsP = loadStandings();

    await matchesP;          // first paint as soon as the schedule is ready
    renderCurrentView();

    // ESPN overlay + standings finish in the background, then re-render
    await Promise.all([standingsP, loadEspnLive()]);

    statusEl.textContent = '● Live';
    statusEl.className = 'api-status ok';
    document.getElementById('error-container').innerHTML = '';
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{timeZone: tz(),hour:'numeric',minute:'2-digit',hour12:true}) + ' ' + tzShort();
  } catch(e) {
    statusEl.textContent = '✕ Offline';
    statusEl.className = 'api-status err';
    document.getElementById('error-container').innerHTML =
      `<div class="error-banner">⚠️ Couldn't reach the scores API. Showing cached data. Will retry automatically.</div>`;
  }

  renderCurrentView();
  scheduleNext();
}

function scheduleNext() {
  clearTimeout(refreshTimer);
  const hasLive = allMatches.some(m => m.status === 'IN_PLAY' || m.status === 'PAUSED');
  refreshTimer = setTimeout(refreshAll, hasLive ? REFRESH_LIVE : REFRESH_NORMAL);
}

// ─── TIME UTILS ───────────────────────────────────────────────────────────────
function formatPST(isoString) {
  if (!isoString) return '';
  return new Date(isoString).toLocaleTimeString('en-US',{
    timeZone: tz(), hour:'numeric', minute:'2-digit', hour12:true
  });
}

function formatDatePST(isoString) {
  return new Date(isoString).toLocaleDateString('en-US',{
    timeZone: tz(), weekday:'short', month:'short', day:'numeric'
  });
}

function datekeyPST(isoString) {
  return new Date(isoString).toLocaleDateString('en-US',{
    timeZone: tz(), year:'numeric', month:'2-digit', day:'2-digit'
  });
}

function todayKeyPST() { return datekeyPST(new Date().toISOString()); }

// ─── STATUS HELPERS ───────────────────────────────────────────────────────────
function matchStatus(m) {
  // A posted final result is authoritative.
  if (m.status === 'FINISHED') return 'completed';
  // ESPN's live state is the most reliable "has play actually started" signal — trust
  // it over football-data's status and over the kickoff-time guess. This is what
  // handles weather delays: football-data may prematurely flip to IN_PLAY at the
  // scheduled time, but ESPN still says 'pre' (and often carries the new kickoff).
  const e = m._espn;
  if (e && e.state === 'pre')  return 'upcoming';
  if (e && e.state === 'post') return 'completed';
  if (e && e.state === 'in')   return 'live';
  if (m.status === 'IN_PLAY' || m.status === 'PAUSED') return 'live';
  // No ESPN opinion: fall back to the kickoff-time guess (API can lag flipping to
  // live), treating the first ~2.5 hours after kickoff as live.
  if (m.status === 'TIMED' || m.status === 'SCHEDULED' || !m.status) {
    const start = new Date(m.utcDate).getTime();
    const now = Date.now();
    if (now >= start && now < start + 150 * 60000) return 'live';
  }
  return 'upcoming';
}

// Live match clock: returns {label, detail} based on minute/half if available
// On-pitch score to display. football-data's fullTime for a shootout INCLUDES the
// penalty goals (e.g. it reports "4-5" for a 1-1 game won 4-3 on pens), so subtract
// the shootout back out — the score that "stands" is regulation + extra time.
function matchDisplayScore(m) {
  const sc = m.score || {};
  const ft = sc.fullTime || {}, ht = sc.halfTime || {};
  let h = ft.home ?? ht.home, a = ft.away ?? ht.away;
  const p = sc.penalties;
  if (p && typeof p.home === 'number' && typeof h === 'number' && typeof a === 'number') {
    h -= p.home; a -= p.away;
  }
  return { home: h, away: a };
}

function matchClock(m) {
  // Prefer ESPN's real match clock when present
  if (m._espn && m._espn.state === 'in') {
    const e = m._espn;
    const txt = ((e.desc || '') + ' ' + (e.detail || '')).toLowerCase();
    const period = e.period || 0;
    // Penalty shootout — never call this "extra time".
    if (period >= 5 || /penalt|shootout/.test(txt)) {
      const so = (typeof e.shHome === 'number' && typeof e.shAway === 'number') ? `${e.shHome}–${e.shAway}` : '';
      return { label: 'Penalties', detail: so };
    }
    const inET = period >= 3 || /extra/.test(txt);
    const isBreak = m.status === 'PAUSED' || /half\s*time|halftime|end of|break|interval/.test(txt);
    if (isBreak) return inET ? { label: 'Extra Time', detail: 'break' } : { label: 'Half Time', detail: '' };
    if (inET) return { label: 'Extra Time', detail: e.clock || '' };
    if (period === 2) return { label: '2nd Half', detail: e.clock || '' };
    if (period === 1) return { label: '1st Half', detail: e.clock || '' };
    return { label: 'Live', detail: e.clock || '' };
  }

  // Prefer the API's own minute if present
  const start = new Date(m.utcDate).getTime();
  const elapsedMin = Math.floor((Date.now() - start) / 60000);

  // Paused without ESPN detail — best guess is half-time (regulation); we can't tell
  // an extra-time break apart here, so keep it generic.
  if (m.status === 'PAUSED') return { label: 'Half Time', detail: '' };

  // Use API minute when available, else estimate from kickoff
  let minute = (typeof m.minute === 'number') ? m.minute : elapsedMin;
  if (minute < 0) minute = 0;

  if (minute <= 45) return { label: `1st Half`, detail: `${minute}'` };
  if (minute <= 47) return { label: `1st Half`, detail: `45+'` };
  if (minute < 60)  return { label: `Half Time`, detail: '' };
  // crude: assume ~15min break, second half starts ~60min after KO
  const secondHalfMin = 45 + Math.max(0, minute - 60);
  if (secondHalfMin <= 90) return { label: `2nd Half`, detail: `${secondHalfMin}'` };
  return { label: `2nd Half`, detail: `90+'` };
}

function groupOfMatch(m) {
  // Handles "GROUP_A", "Group A", or "A"
  const raw = String(m.group || '');
  const match = raw.match(/GROUP[_\s]*([A-L])\b/i) || raw.match(/^([A-L])$/i) || raw.match(/\b([A-L])\s*$/i);
  if (match) return match[1].toUpperCase();
  // Team-name fallback applies to group-stage matches only —
  // knockout matches should show the round name, not a group tag
  if (!m.stage || m.stage === 'GROUP_STAGE') {
    return groupOfTeam(m.homeTeam?.name) || groupOfTeam(m.awayTeam?.name) || null;
  }
  return null;
}

// ─── RENDER SCHEDULE ─────────────────────────────────────────────────────────
function renderSchedule() {
  const container   = document.getElementById('schedule-list');
  const nextUpEl    = document.getElementById('next-up-container');
  const filterRowEl = document.getElementById('filter-row');

  // Group filter — a collapsed "Groups" toggle keeps Sync / device on one line;
  // tap it to reveal the A–L grid. Picking a group (or All) collapses it again.
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const grpLabel = activeFilter === 'all' ? 'Groups' : 'Grp ' + activeFilter;
  filterRowEl.innerHTML =
    `<div class="filter-controls">`
    + `<button class="grp-toggle ${activeFilter!=='all'?'filtered':''}" onclick="toggleGroups()">${groupsOpen?'▾':'▸'} ${grpLabel}</button>`
    + `<button class="sync-btn" onclick="setupSync()">${syncCode ? '☁ Synced' : '☁ Sync'}</button>`
    + `<select class="filter-btn" style="appearance:auto" onchange="setTZ(this.value)">`
    + `${TZ_OPTIONS.map(o => `<option value="${o.id}" ${o.id===userTZ?'selected':''}>🕐 ${o.label}</option>`).join('')}`
    + `</select>`
    + `</div>`
    + (groupsOpen
        ? `<div class="grp-grid">`
          + `<button class="grp-badge all ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>`
          + groups.map(g => `<button class="grp-badge ${activeFilter===g?'active':''}" onclick="setFilter('${g}')">${g}</button>`).join('')
          + `</div>`
        : '');

  // Filter
  let matches = allMatches.filter(m =>
    m.stage === 'GROUP_STAGE' || m.stage === 'LAST_32' ||
    m.stage === 'LAST_16' || m.stage === 'QUARTER_FINALS' ||
    m.stage === 'SEMI_FINALS' || m.stage === 'FINAL' ||
    m.stage === 'THIRD_PLACE'
  );

  if (activeFilter !== 'all') {
    matches = matches.filter(m => groupOfMatch(m) === activeFilter);
  }

  // Sort
  const live      = matches.filter(m => matchStatus(m) === 'live');
  const upcoming  = matches.filter(m => matchStatus(m) === 'upcoming')
                           .sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));
  const completed = matches.filter(m => matchStatus(m) === 'completed')
                           .sort((a,b) => new Date(b.utcDate)-new Date(a.utcDate));

  // Next up banner (with countdown)
  let bannerHtml = '';
  if (live.length > 0) {
    const m = live[0];
    const hn = m.homeTeam?.name || 'TBD', an = m.awayTeam?.name || 'TBD';
    const hs = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
    nextKickoff = null;
    const liveVenueTxt = matchVenueText(m);
    const clk = matchClock(m);
    const apiLive = (m.status === 'IN_PLAY' || m.status === 'PAUSED') || !!m._espn;
    bannerHtml = `
      <div class="next-up-banner" style="background:var(--live-red)">
        <span class="next-up-label" style="color:white">🔴 ${clk.detail || 'LIVE'}</span>
        <span class="next-up-game">${flag(hn)} ${hn} ${hs} – ${as_} ${an} ${flag(an)}</span>
        <div class="next-up-countdown">${clk.label}${!apiLive ? ' · awaiting score from API' : ''}${liveVenueTxt ? ' · 🏟 ' + liveVenueTxt : ''}</div>
      </div>`;
  } else if (upcoming.length > 0) {
    const m = upcoming[0];
    const hn = m.homeTeam?.name || 'TBD', an = m.awayTeam?.name || 'TBD';
    nextKickoff = new Date(m.utcDate);
    const venueTxt = matchVenueText(m);
    // Weather at the venue (filled in async by loadMatchWeather): forecast up to 15
    // days out, realtime "now" within 12h of kickoff.
    const wxCode = venueCodeFor(m);
    const hrsToKO = (new Date(m.utcDate).getTime() - Date.now()) / 3600000;
    const wxMode = hrsToKO <= 12 ? 'now' : (hrsToKO <= 15 * 24 ? 'forecast' : '');
    const wxChip = (wxCode && wxMode)
      ? `<span class="next-up-wx match-wx" data-wx-code="${wxCode}" data-wx-when="${m.utcDate}" data-wx-mode="${wxMode}">⛅ …</span>` : '';
    bannerHtml = `
      <div class="next-up-banner">
        <span class="next-up-label">Next Up</span>
        <span class="next-up-game">${flag(hn)} ${hn} vs ${an} ${flag(an)}</span>
        <span class="next-up-time">${formatPST(m.utcDate)} ${tzShort()}</span>
        ${wxChip}
        ${venueTxt ? `<div class="next-up-countdown">🏟 ${venueTxt}</div>` : ''}
        <div class="next-up-countdown" id="nextCountdown"></div>
      </div>`;
  } else {
    nextKickoff = null;
  }

  // ⭐ My Teams section: live or next match for each favorite
  let myTeamsHtml = '';
  if (favorites.size > 0 && activeFilter === 'all') {
    // Sort favorites by soonest game: live first, then earliest kickoff,
    // then teams with no remaining matches last
    const favList = [...favorites].map(name => {
      const tm = allMatches.filter(m =>
        m.homeTeam?.name === name || m.awayTeam?.name === name);
      const hasLive = tm.some(m => matchStatus(m) === 'live');
      const next = tm.filter(m => matchStatus(m) === 'upcoming')
        .sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate))[0];
      return {
        name,
        sortKey: hasLive ? 0 : (next ? new Date(next.utcDate).getTime() : Infinity)
      };
    }).sort((a,b) => a.sortKey - b.sortKey).map(f => f.name);

    const rows = favList.map(name => {
      const teamMatches = allMatches.filter(m =>
        m.homeTeam?.name === name || m.awayTeam?.name === name);
      const liveM = teamMatches.find(m => matchStatus(m) === 'live');
      const nextM = teamMatches.filter(m => matchStatus(m) === 'upcoming')
        .sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate))[0];
      let info = '', time = '';
      if (liveM) {
        const hs = liveM.score?.fullTime?.home ?? 0, as_ = liveM.score?.fullTime?.away ?? 0;
        const opp = liveM.homeTeam?.name === name ? liveM.awayTeam?.name : liveM.homeTeam?.name;
        const v = matchVenueText(liveM);
        info = `🔴 LIVE vs ${opp}${v ? ' · 🏟 ' + v : ''}`;
        time = `${hs} – ${as_}`;
      } else if (nextM) {
        const opp = nextM.homeTeam?.name === name ? nextM.awayTeam?.name : nextM.homeTeam?.name;
        const v = matchVenueText(nextM);
        info = `vs ${opp}${v ? ' · 🏟 ' + v : ''}`;
        time = `${formatDatePST(nextM.utcDate)} · ${formatPST(nextM.utcDate)}`;
      } else {
        info = 'No upcoming matches';
      }
      return `<div class="my-team-row" data-team="${name.replace(/"/g,'&quot;')}">
        <span>${flag(name)}</span>
        <span class="my-team-name">${name}</span>
        <span class="my-team-next">${info}</span>
        <span class="my-team-time">${time}</span>
      </div>`;
    }).join('');
    myTeamsHtml = `<div class="my-teams-section">
      <div class="my-teams-title">⭐ My Teams</div>${rows}
    </div>`;
  }

  nextUpEl.innerHTML = myTeamsHtml + bannerHtml;
  updateCountdown();

  // Build cards grouped by date
  const todayK = todayKeyPST();

  // Split into TODAY (all statuses) and OTHER days
  const todayMatches = matches.filter(m => datekeyPST(m.utcDate) === todayK);
  const otherMatches = matches.filter(m => datekeyPST(m.utcDate) !== todayK);

  // Within today: chronological order (as played) — completed first, then live, then upcoming
  const tStatus = m => matchStatus(m);
  const todaySorted = todayMatches.slice().sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));

  // Other days: future first (chronological), then past days (reverse) at the very bottom
  const futureOther = otherMatches.filter(m => new Date(m.utcDate) > Date.now())
                                  .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
  const pastOther   = otherMatches.filter(m => new Date(m.utcDate) <= Date.now())
                                  .sort((a,b)=>new Date(b.utcDate)-new Date(a.utcDate));

  // Count today's matches (for the header + jump button)
  const todayCount = todayMatches.length;
  const todayBar = document.getElementById('today-bar');
  if (todayBar) {
    if (todayCount > 0) {
      const done = todayMatches.filter(m => tStatus(m) === 'completed').length;
      const liveN = todayMatches.filter(m => tStatus(m) === 'live').length;
      let summary = `${todayCount} match${todayCount>1?'es':''} today`;
      if (liveN) summary += ` · ${liveN} live`;
      if (done) summary += ` · ${done} final`;
      todayBar.innerHTML = `<span class="today-count">📅 ${summary}</span>`;
    } else {
      const nextUp = futureOther[0];
      todayBar.innerHTML = nextUp
        ? `<span class="today-count">No matches today · next on ${formatDatePST(nextUp.utcDate)}</span>`
        : '';
    }
  }

  let html = '';

  // ── EARLIER RESULTS (collapsible, above today, collapsed by default) ──
  if (pastOther.length) {
    const open = scheduleSections.past;
    const days = new Set(pastOther.map(m => datekeyPST(m.utcDate))).size;
    html += `<div class="collapse-header" onclick="toggleSection('past')">
      <span>◂ Earlier Results</span>
      <span class="collapse-meta">${pastOther.length} games · ${days} day${days>1?'s':''} ${open?'▲':'▼'}</span>
    </div>`;
    if (open) {
      let lastDate = null;
      pastOther.forEach(m => {
        const dk = datekeyPST(m.utcDate);
        if (dk !== lastDate) {
          html += `<div class="date-divider"><span class="date-label">${formatDatePST(m.utcDate)}</span></div>`;
          lastDate = dk;
        }
        html += renderMatchCard(m, matchStatus(m));
      });
    }
  }

  // ── TODAY (always expanded, pinned) ──
  if (todaySorted.length) {
    html += `<div class="date-divider today" id="today-divider">
      <span class="date-label" style="color:var(--pitch)">${formatDatePST(todaySorted[0].utcDate)}</span>
      <span class="today-pill">Today</span>
    </div>`;
    todaySorted.forEach(m => { html += renderMatchCard(m, matchStatus(m)); });
  }

  // ── UPCOMING (collapsible, below today, collapsed by default) ──
  if (futureOther.length) {
    const open = scheduleSections.future;
    const days = new Set(futureOther.map(m => datekeyPST(m.utcDate))).size;
    html += `<div class="collapse-header" onclick="toggleSection('future')">
      <span>▸ Upcoming Matches</span>
      <span class="collapse-meta">${futureOther.length} games · ${days} day${days>1?'s':''} ${open?'▲':'▼'}</span>
    </div>`;
    if (open) {
      let lastDate = null;
      futureOther.forEach(m => {
        const dk = datekeyPST(m.utcDate);
        if (dk !== lastDate) {
          html += `<div class="date-divider"><span class="date-label">${formatDatePST(m.utcDate)}</span></div>`;
          lastDate = dk;
        }
        html += renderMatchCard(m, matchStatus(m));
      });
    }
  }

  if (!html) html = `<div class="loading-spinner">No matches found.</div>`;
  container.innerHTML = html;
  loadMatchWeather(); // fill in weather for matches within 24h
}

function toggleSection(which) {
  scheduleSections[which] = !scheduleSections[which];

function jumpToToday() {
  const el = document.getElementById('today-divider');
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const firstCard = document.querySelector('#schedule-list .match-card');

function renderMatchCard(m, status) {
  const hn  = m.homeTeam?.name || m.homeTeam?.shortName || 'TBD';
  const an  = m.awayTeam?.name || m.awayTeam?.shortName || 'TBD';
  const grp = groupOfMatch(m);
  const grpTag = grp
    ? `<span class="group-tag clickable" onclick="goToGroup('${grp}')">GRP ${grp} ›</span>`
    : m._koNum
    ? `<span class="group-tag">MATCH ${m._koNum}</span>`
    : `<span class="group-tag">${(m.stage||'').replace(/_/g,' ')}</span>`;

  // Score helper: on-pitch score (shootout goals excluded — see matchDisplayScore)
  const _ds = matchDisplayScore(m);
  const hs  = _ds.home ?? 0;
  const as_ = _ds.away ?? 0;

  // Extra time / penalty shootout annotations
  const pens = m.score?.penalties;
  const dur  = m.score?.duration;
  let endTag = 'FT';
  let penLine = '';
  if (dur === 'PENALTY_SHOOTOUT' && pens && pens.home != null) {
    endTag = `${pens.home} – ${pens.away} pens`;
  } else if (dur === 'EXTRA_TIME') {
    endTag = 'AET';
  }

  let center = '';
  if (status === 'live') {
    const apiLive = (m.status === 'IN_PLAY' || m.status === 'PAUSED') || !!m._espn;
    const clk = matchClock(m);
    const scoreKnown = (m.score?.fullTime?.home != null) || apiLive;
    center = `${grpTag}
      <span class="live-badge"><span class="live-dot"></span>${clk.detail || 'LIVE'}</span>
      <div class="score-display">${hs} – ${as_}</div>
      <div class="match-time" style="color:var(--live-red)">${clk.label}${!scoreKnown ? ' · awaiting score' : ''}</div>`;
  } else if (status === 'completed') {
    center = `${grpTag}
      <div class="score-display">${hs} – ${as_}</div>
      <div class="match-time done">${endTag}</div>`;
  } else {
    // Delayed: past the scheduled kickoff but ESPN says it hasn't started (weather,
    // etc.). Show "Delayed" with ESPN's new time if it carries one.
    const past = new Date(m.utcDate).getTime() < Date.now();
    const delayed = m._espn && m._espn.state === 'pre' && past;
    const koISO = (delayed && m._espn.startISO) ? m._espn.startISO : m.utcDate;
    center = `${grpTag}
      <div class="vs-display">VS</div>
      <div class="match-time"${delayed ? ' style="color:var(--live-red)"' : ''}>${delayed ? '⏳ Delayed · ' : ''}${formatPST(koISO)} ${tzShort()}</div>`;
  }

  let venue = m.venue || '';
  let city = venueCity(venue);
  // Knockout matches carry no API venue. Resolve the stadium from KO_SCHEDULE by
  // kickoff time here so location + weather work on ANY tab — the Knockout tab set
  // this via _koVenueCode, but the Schedule tab didn't, so KO games lost both once
  // the group stage (whose venues come from a team-pair table) ended.
  let koVenueCode = m._koVenueCode;
  if (!koVenueCode && KO_SCHEDULE[m.stage]) {
    const want = new Date(m.utcDate).getTime();
    const slot = (KO_SCHEDULE[m.stage] || []).find(s => new Date(etToUtcISO(s.date, s.et)).getTime() === want);
    if (slot) koVenueCode = slot.v;
  }
  if (!venue && koVenueCode && STADIUMS[koVenueCode]) {
    [venue, city] = STADIUMS[koVenueCode];
  } else if (!venue) {
    const hc = lookupVenue(hn, an);
    if (hc) { venue = hc[0]; city = hc[1]; }
  }
  // The Knockout tab has no date dividers (unlike Schedule), so confirmed KO cards
  // need their own date here — matching the placeholder cards' "Mon, Jun 29" line.
  const koDate = (m._koNum && typeof currentView !== 'undefined' && currentView === 'knockout')
    ? formatDatePST(m.utcDate) : '';
  const meta = [koDate, venue ? `🏟 ${venue}` : '', city].filter(Boolean).join(' · ');

  // Weather slot (filled async after render). Forecast up to 15 days out, and a
  // realtime "now" reading on game day (≤12h to kickoff) and while the match is live.
  const wxCode = koVenueCode || lookupVenueCode(m);
  const hrsToKO = (new Date(m.utcDate).getTime() - Date.now()) / 3600000;
  let wxMode = '';
  if (status === 'live') wxMode = 'now';
  else if (status !== 'completed' && hrsToKO > 0)
    wxMode = hrsToKO <= 12 ? 'now' : (hrsToKO <= 15 * 24 ? 'forecast' : '');
  const wxSlot = (wxCode && wxMode)
    ? `<div class="match-wx" data-wx-code="${wxCode}" data-wx-when="${m.utcDate}" data-wx-mode="${wxMode}">⛅ …</div>`
    : '';

  // Recent form (last 5) from ESPN, shown for upcoming/live games within range
  const homeForm = m._espn?.homeForm || '';
  const awayForm = m._espn?.awayForm || '';
  const formHtml = (s) => s ? `<div class="team-form">${[...s].map(ch =>
    `<span class="form-${ch.toLowerCase()}">${ch}</span>`).join(' ')}</div>` : '';

  // Broadcast channel (ESPN), shown for upcoming games
  const bcast = m._espn?.broadcast;
  const bcastHtml = (bcast && status === 'upcoming')
    ? `<div class="broadcast-tag">📺 ${bcast}</div>` : '';

  // Attendance (ESPN), shown for live/completed games once available
  const att = m._espn?.attendance;
  const attHtml = (att && att > 0 && status !== 'upcoming')
    ? `<div class="attendance-tag">👥 ${att.toLocaleString()} fans</div>` : '';

  // Match Details button (live or completed games with an ESPN id)
  const eid = m._espnId || '';
  const detailBtn = (eid && (status === 'live' || status === 'completed'))
    ? `<button class="detail-btn ${status==='completed'?'done':''}"
        onclick="showMatchDetail('${eid}','${hn.replace(/'/g,"\\'")}','${an.replace(/'/g,"\\'")}')">
        ${status === 'live' ? '⚽ Live Match Details' : '📊 Match Details'}</button>`
    : '';

  return `
    <div class="match-card ${status}">
      <div class="team-block" data-team="${hn.replace(/"/g,'&quot;')}">
        <span class="team-flag">${flag(hn)}</span>
        <span class="team-name">${hn}${favMark(hn)}</span>
        ${fifaRank(hn) ? `<span class="card-rank">🌍 #${fifaRank(hn)}</span>` : ''}
        ${formHtml(homeForm)}
      </div>
      <div class="match-center">
        ${center}
        <div class="match-meta">${meta}</div>
        ${wxSlot}
        ${bcastHtml}
        ${attHtml}
        ${detailBtn}
      </div>
      <div class="team-block right" data-team="${an.replace(/"/g,'&quot;')}">
        <span class="team-flag">${flag(an)}</span>
        <span class="team-name">${an}${favMark(an)}</span>
        ${fifaRank(an) ? `<span class="card-rank">🌍 #${fifaRank(an)}</span>` : ''}
        ${formHtml(awayForm)}
      </div>
    </div>`;
}

// ─── RENDER GROUPS ────────────────────────────────────────────────────────────
function computeStandingsFromMatches() {
  // Fallback: build group tables directly from match results
  const map = {};
  allMatches.filter(m => m.stage === 'GROUP_STAGE').forEach(m => {
    const letter = groupOfMatch(m);
    if (!letter) return;
    if (!map[letter]) map[letter] = {};
    const hn = m.homeTeam?.name || 'TBD';
    const an = m.awayTeam?.name || 'TBD';
    [hn, an].forEach(t => {
      if (!map[letter][t]) map[letter][t] = {team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};
    });
    if (m.status === 'FINISHED' || m.status === 'IN_PLAY' || m.status === 'PAUSED') {
      const hs = m.score?.fullTime?.home ?? m.score?.halfTime?.home;
      const as_ = m.score?.fullTime?.away ?? m.score?.halfTime?.away;
      if (hs == null || as_ == null) return;
      // Only count finished matches toward the table
      if (m.status !== 'FINISHED') return;
      const H = map[letter][hn], A = map[letter][an];
      H.mp++; A.mp++;
      H.gf += hs; H.ga += as_; A.gf += as_; A.ga += hs;
      H.gd = H.gf - H.ga; A.gd = A.gf - A.ga;
      if (hs > as_)      { H.w++; H.pts += 3; A.l++; }
      else if (as_ > hs) { A.w++; A.pts += 3; H.l++; }
      else               { H.d++; A.d++; H.pts++; A.pts++; }
    }
  });
  const out = {};
  Object.keys(map).forEach(letter => {
    out[letter] = Object.values(map[letter])
      .sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  });
  return out;
}

                </div></td>

        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function etToUtcISO(date, et) {
  // ET in summer = EDT = UTC-4
  const [y,mo,d] = date.split('-').map(Number);
  const [h,mi] = et.split(':').map(Number);
  return new Date(Date.UTC(y, mo-1, d, h+4, mi)).toISOString();
}

// ─── GROUP CLINCH ENGINE (points-only — never shows a wrong team) ─────────────
// Brute-forces every win/draw/loss combo of a group's remaining games. A team can
// hold a position in a scenario if its points rank-band covers it (ties count as
// "possible" since goal difference could break either way). A position is CLINCHED
// when exactly one team can ever land there; otherwise we list the "possible" teams.
let _clinchSig = null, _clinchData = null;
function groupClinch(L){
  const rows = standingsMap[L];
  const blank = { 1:{clinched:null,possible:[]}, 2:{clinched:null,possible:[]} };
  if(!rows || rows.length < 2) return blank;
  const teams = rows.map(r=>r.team);
  const basePts = {}; rows.forEach(r=> basePts[canonName(r.team)] = r.pts||0);
  const rem = allMatches.filter(m=> m.stage==='GROUP_STAGE'
      && groupOfTeam(m.homeTeam?.name)===L && groupOfTeam(m.awayTeam?.name)===L && m.status!=='FINISHED');
  const k = rem.length;
  const poss1 = new Set(), poss2 = new Set();
  for(let mask=0; mask < 3**k; mask++){
    const pts = {...basePts}; let mm = mask;
    for(let i=0;i<k;i++){ const o = mm%3; mm = (mm-o)/3;
      const h = canonName(rem[i].homeTeam.name), a = canonName(rem[i].awayTeam.name);
      if(o===0) pts[h]+=3; else if(o===1){ pts[h]++; pts[a]++; } else pts[a]+=3; }
    teams.forEach(t=>{ const c = canonName(t), me = pts[c]; let gt=0, eq=0;
      teams.forEach(u=>{ if(u!==t){ const v = pts[canonName(u)]; if(v>me) gt++; else if(v===me) eq++; } });

function thirdPlaceKey(){
  // Sorted-letter key of the 8 qualifying groups, or null if not every group is
  // finished OR the 8th/9th cutoff is a dead heat on pts/GD/GF (can't be certain).
  const letters=Object.keys(standingsMap);
  if(letters.length<12) return null;
  const thirds=[];
  for(const L of letters){
    const rows=standingsMap[L];
    if(!rows || rows.length<3 || !rows.every(r=>(r.mp||0)>=3)) return null;
    const r=rows[2]; thirds.push({L, pts:r.pts||0, gd:r.gd||0, gf:r.gf||0});
  }
  thirds.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  const c=thirds[7], d=thirds[8];
  if(d && c.pts===d.pts && c.gd===d.gd && c.gf===d.gf) return null;

function resolveThirdForWinner(winnerLetter){
  const sig=(allMatches||[]).filter(m=>m.stage==='GROUP_STAGE').map(m=>m.status==='FINISHED'?'1':'0').join('');
  if(sig!==_thirdSig){ _thirdKey=thirdPlaceKey(); _thirdSig=sig; }
  if(!_thirdKey) return null;
  const assign=THIRD_ASSIGN[_thirdKey]; if(!assign) return null;
  const idx=THIRD_COLS.indexOf(winnerLetter); if(idx<0) return null;

function koTeamHTML(team, title){
  const dt = team.replace(/"/g,'&quot;');
  return `<span class="team-flag" data-team="${dt}">${flag(team)}</span>`
    + `<span class="team-name" data-team="${dt}">${team} <span class="ko-clinch" title="${title}">✓</span></span>`;
}
function koSideHTML(desc, slot){
  // Best-eight third-placed slot (e.g. "3rd A/B/C/D/F") — resolve via Annex C once
  // all groups are done. The winner it faces is the "1X" side of this same slot.
  if(slot && /^3rd/i.test(desc||'')){
    const other=(slot.home===desc)?slot.away:slot.home;
    const w=/^1([A-L])$/.exec((other||'').trim());
    const team=w?resolveThirdForWinner(w[1]):null;
    if(team) return koTeamHTML(team, '3rd place · Group '+(groupOfTeam(team)||'?')+' (best eight)');
  }
  const info = resolveKOSlot(desc);
  if(info && info.clinched) return koTeamHTML(info.clinched, 'Clinched '+desc);
  return `<span class="team-flag">⚪</span><span class="team-name" style="color:var(--muted)">${desc}</span>`;
}
function koPossibleStrip(slot){
  const seen=new Set(), parts=[];
  [slot.home, slot.away].forEach(desc=>{
    if(seen.has(desc)) return; seen.add(desc);
    const info = resolveKOSlot(desc);
    if(info && !info.clinched && info.possible.length>1 && info.possible.length<info.groupSize){
      const list = info.possible.map(t=>`<span data-team="${t.replace(/"/g,'&quot;')}">${flag(t)} ${t}</span>`).join(' · ');
      parts.push(`<div class="ko-poss"><b>${desc}</b> · ${info.possible.length} possible: ${list}</div>`);
    }
  });
  return parts.length ? `<div class="ko-poss-wrap">${parts.join('')}</div>` : '';
}

function renderPlaceholderKO(slot) {
  const stad = STADIUMS[slot.v] || ['',''];
  const iso = etToUtcISO(slot.date, slot.et);

  return `
    <div class="ko-slot-wrap">

        <div class="match-time">${formatPST(iso)} ${tzShort()}</div>
        <div class="match-meta">${formatDatePST(iso)}${meta ? ' · 🏟 ' + meta : ''}</div>
      </div>
      <div class="team-block right">
        ${koSideHTML(slot.away, slot)}
      </div>
    </div>

// Find the API fixture for a KO slot. Kickoff time uniquely identifies a slot
// across the whole bracket, and the API carries no venue — so we key on time and
// pull venue/number from KO_SCHEDULE instead.
function koMatchForSlot(stage, slot){
  const want = new Date(etToUtcISO(slot.date, slot.et)).getTime();
  return allMatches.find(m => m.stage === stage &&
    new Date(m.utcDate).getTime() === want) || null;
}

let koView = localStorage.getItem('wc_ko_view') || 'list';   // 'list' | 'tree'
function setKoView(v){ koView=v; localStorage.setItem('wc_ko_view', v); renderKnockout(); }
function koViewToggle(){
  return `<div class="ko-viewtoggle">`
    + `<button class="ko-vt ${koView==='list'?'on':''}" onclick="setKoView('list')">📋 List</button>`
    + `<button class="ko-vt ${koView==='tree'?'on':''}" onclick="setKoView('tree')">🗺 Bracket</button></div>`;
}

function renderKnockout() {
  const container = document.getElementById('knockout-list');
  if (koView === 'tree') {
    container.innerHTML = koViewToggle() + renderKnockoutTree();
    return;
  }
  const stages = [
    {key:'LAST_32',     label:'Round of 32'},
    {key:'LAST_16',     label:'Round of 16'},
    {key:'QUARTER_FINALS', label:'Quarterfinals'},
    {key:'SEMI_FINALS', label:'Semifinals'},
    {key:'THIRD_PLACE', label:'Third Place'},
    {key:'FINAL',       label:'🏆 Final'},
  ];

  let html = '';
  stages.forEach(({key, label}) => {
    const slots = (KO_SCHEDULE[key] || []).slice()
      .sort((a,b)=> new Date(etToUtcISO(a.date,a.et)) - new Date(etToUtcISO(b.date,b.et)));
    if (!slots.length) return;

    // Render every slot: a confirmed fixture (both real teams) becomes a full match
    // card; everything else stays a placeholder with its clinched/possible match-ups.
    let confirmed = 0;
    let body = '';
    slots.forEach(slot => {
      const m = koMatchForSlot(key, slot);
      if (m && groupOfTeam(m.homeTeam?.name) && groupOfTeam(m.awayTeam?.name)) {
        m._koNum = slot.n; m._koVenueCode = slot.v;   // so the card keeps MATCH #, venue & weather
        body += renderMatchCard(m, matchStatus(m));
        confirmed++;
      } else {
        body += renderPlaceholderKO(slot);
      }
    });

    const note = confirmed >= slots.length ? '' :
      confirmed > 0 ? ` · ${confirmed} confirmed` : ' · teams TBD';
    html += `<div class="section-head"><h2>${label}</h2><span class="count">${slots.length} match${slots.length>1?'es':''}${note}</span></div>` + body;
  });

  if (!html) html = '<div class="loading-spinner">Knockout schedule loading…</div>';
  container.innerHTML = koViewToggle() + html;
  loadMatchWeather(); // fill forecast / live weather into confirmed-fixture cards
}

function koChildren(n){

  const ref=desc=>{ let m;
    if((m=/^W (\d+)$/.exec(desc))) return +m[1];
    if((m=/^W SF(\d)$/.exec(desc))) return desc==='W SF1'?101:102;
    return null; };
  const a=ref(slot.home), b=ref(slot.away);
  return (a&&b)?[a,b]:null;
}
function koOrderKeys(){
  const key={};
  (function rec(n){ const c=koChildren(n);
    if(!c){ key[n]=Object.keys(key).length; return key[n]; }
    const a=rec(c[0]), b=rec(c[1]); key[n]=(a+b)/2; return key[n];
  })(104);
  return key;
}
function koResolveSide(desc, slot){
  if(slot && /^3rd/i.test(desc||'')){
    const other=(slot.home===desc)?slot.away:slot.home;
    const w=/^1([A-L])$/.exec((other||'').trim());
    return w?resolveThirdForWinner(w[1]):null;
  }
  let m;
  if((m=/^W (\d+)$/.exec(desc))) return koActualWinner(+m[1]);
  if((m=/^W SF(\d)$/.exec(desc))) return koActualWinner(desc==='W SF1'?101:102);
  if((m=/^L SF(\d)$/.exec(desc))) return koActualLoser(desc==='L SF1'?101:102);
  const info=resolveKOSlot(desc); return (info&&info.clinched)?info.clinched:null;
}
function koTreeSide(desc, slot, win){
  const team=koResolveSide(desc, slot);
  if(team){ const dt=team.replace(/"/g,'&quot;'); const won=win&&canonName(team)===win;
    return `<span class="bt-team${won?' won':''}" data-team="${dt}">${flag(team)}<span class="bt-nm">${team}</span></span>`; }
  return `<span class="bt-team tbd">${desc}</span>`;
}
function koTreeMatch(n){
  const slot=koSlot(n); if(!slot) return '<div class="bt-match"></div>';
  const m=koMatchForSlot(roundOfMatch(n), slot);
  const win=(m && m.status==='FINISHED') ? canonName(poolWinnerOf(m)||'') : null;
  let live='';
  if(m){ const st=matchStatus(m); const ds=matchDisplayScore(m); const pens=m.score?.penalties;
    if(st==='live' && typeof ds.home==='number'){ const c=matchClock(m); const tag=[c.label,c.detail].filter(Boolean).join(' ');
      live=`<div class="bt-score live"><span class="pool-live-dot"></span>${ds.home}–${ds.away}${tag?` ${tag}`:''}</div>`; }
    else if(st==='completed' && typeof ds.home==='number'){ const pk=(pens&&typeof pens.home==='number')?` (${pens.home}–${pens.away}p)`:'';
      live=`<div class="bt-score">${ds.home}–${ds.away}${pk}</div>`; } }
  return `<div class="bt-match"><span class="bt-no">M${n}</span>`
    + koTreeSide(slot.home, slot, win) + koTreeSide(slot.away, slot, win) + live + `</div>`;
}
function renderKnockoutTree(){
  const key=koOrderKeys();
  const cols=[['LAST_32','R32'],['LAST_16','R16'],['QUARTER_FINALS','QF'],['SEMI_FINALS','SF'],['FINAL','🏆 Final']];
  let html=`<div class="bt-hint">Real teams fill in as the tournament unfolds; the advancing side is highlighted. Scroll sideways →</div><div class="bt-scroll"><div class="bt-grid">`;
  cols.forEach(([stage,label])=>{
    const ms=(KO_SCHEDULE[stage]||[]).slice().sort((a,b)=>(key[a.n]??0)-(key[b.n]??0));
    html+=`<div class="bt-col"><div class="bt-colhead">${label}</div><div class="bt-colbody">`;
    ms.forEach(s=>{ html+=koTreeMatch(s.n); });
    html+=`</div></div>`;
  });
  html+=`</div></div>`;
  const tp=(KO_SCHEDULE.THIRD_PLACE||[])[0];
  if(tp) html+=`<div class="bt-thirdwrap"><div class="bt-colhead">Third place</div>${koTreeMatch(tp.n)}</div>`;
  return html;
}

  try {

  } catch(e) {

      '<div class="loading-spinner">Could not load match details right now.</div>';

function renderMatchDetailBody(data, hn, an) {
  let html = '';

  // ── Key events: goals, cards, subs ──
  const events = [];
  (data.commentary || []).forEach(c => {
    if (c.play && (c.play.type?.text || '')) {
      // not always structured — skip generic commentary
    }
  });
  // ESPN summary "keyEvents" is the cleanest source
  const keyEvents = data.keyEvents || [];
  keyEvents.forEach(ev => {
    const t = ev.type?.text || '';
    const clock = ev.clock?.displayValue || '';
    const team = ev.team?.displayName || '';
    const players = (ev.participants || []).map(p => p.athlete?.displayName).filter(Boolean);
    let icon = '';
    if (/goal/i.test(t) && !/own/i.test(t)) icon = '⚽';
    else if (/own goal/i.test(t)) icon = '⚽ (OG)';
    else if (/yellow/i.test(t)) icon = '🟨';
    else if (/red/i.test(t)) icon = '🟥';
    else if (/substitution/i.test(t)) icon = '🔄';
    else if (/penalty/i.test(t)) icon = '🎯';
    if (icon) {
      events.push({ clock, icon, team, detail: players.join(', ') || t });
    }
  });

  if (events.length) {
    html += `<div class="section-head"><h2>Key Events</h2></div>`;
    events.forEach(ev => {
      html += `<div class="event-row">
        <span class="event-clock">${ev.clock}</span>
        <span class="event-icon">${ev.icon}</span>
        <span class="event-detail"><b>${ev.team}</b> ${ev.detail}</span>
      </div>`;
    });
  }

  // ── Team statistics ──
  const teams = data.boxscore?.teams || [];
  if (teams.length === 2) {
    const homeStats = {}, awayStats = {};
    (teams[0].statistics || []).forEach(s => homeStats[s.name] = s.displayValue);
    (teams[1].statistics || []).forEach(s => awayStats[s.name] = s.displayValue);
    const wantStats = [
      ['possessionPct','Possession'],
      ['totalShots','Shots'],
      ['shotsOnTarget','On Target'],
      ['wonCorners','Corners'],
      ['foulsCommitted','Fouls'],
      ['yellowCards','Yellow Cards']
    ];
    const rows = wantStats.filter(([k]) => homeStats[k] != null || awayStats[k] != null);
    if (rows.length) {
      const t0 = teams[0].team?.displayName || hn;
      const t1 = teams[1].team?.displayName || an;
      html += `<div class="section-head"><h2>Match Stats</h2></div>`;
      html += `<div class="stat-head"><span>${t0}</span><span></span><span>${t1}</span></div>`;
      rows.forEach(([k,label]) => {
        html += `<div class="stat-row">
          <span class="stat-h">${homeStats[k] ?? '–'}</span>
          <span class="stat-label">${label}</span>
          <span class="stat-a">${awayStats[k] ?? '–'}</span>
        </div>`;
      });
    }
  }

  // ── Lineups ──
  const rosters = data.rosters || [];
  if (rosters.length === 2) {
    rosters.forEach(r => {
      const starters = (r.roster || []).filter(p => p.starter);
      if (!starters.length) return;
      const teamName = r.team?.displayName || '';
      const formation = r.formation || '';
      html += `<div class="section-head"><h2>${teamName} XI</h2>${formation ? `<span class="count">${formation}</span>` : ''}</div>`;
      html += '<div class="lineup">';
      starters.forEach(p => {
        const nm = p.athlete?.displayName || '';
        const pos = p.position?.abbreviation || '';
        html += `<div class="lineup-player"><span class="lp-pos">${pos}</span> ${nm}</div>`;
      });
      html += '</div>';
    });
  }

  if (!html) html = '<div class="loading-spinner">No detailed data available yet for this match.</div>';
  return html;
}

function showTeam(name) {
  const overlay = document.getElementById('teamModalOverlay');
  const modal   = document.getElementById('teamModal');

  // All matches involving this team
  const teamMatches = allMatches.filter(m =>
    m.homeTeam?.name === name || m.awayTeam?.name === name
  );

  const completed = teamMatches.filter(m => matchStatus(m) === 'completed')
                               .sort((a,b) => new Date(b.utcDate)-new Date(a.utcDate));
  const live      = teamMatches.filter(m => matchStatus(m) === 'live');
  const upcoming  = teamMatches.filter(m => matchStatus(m) === 'upcoming')
                               .sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));

  // W-D-L record from finished matches
  let w=0,d=0,l=0,gf=0,ga=0;
  completed.forEach(m => {
    const isHome = m.homeTeam?.name === name;
    const hs = m.score?.fullTime?.home ?? 0;
    const as_ = m.score?.fullTime?.away ?? 0;
    const my = isHome ? hs : as_, opp = isHome ? as_ : hs;
    gf += my; ga += opp;
    if (my > opp) w++; else if (my < opp) l++; else d++;
  });

  const grp = groupOfTeam(name);

  let body = `
    <div class="team-record-bar">
      <div class="record-chip"><div class="num">${w}</div><div class="lbl">Wins</div></div>
      <div class="record-chip"><div class="num">${d}</div><div class="lbl">Draws</div></div>
      <div class="record-chip"><div class="num">${l}</div><div class="lbl">Losses</div></div>
      <div class="record-chip"><div class="num">${gf}–${ga}</div><div class="lbl">Goals</div></div>
    </div>
    <a class="roster-link" href="${rosterURL(name)}" target="_blank" rel="noopener">👥 View Roster &amp; Player Bios →</a>`;

  if (live.length) {
    body += `<div class="section-head"><h2 style="color:var(--live-red)">🔴 Live Now</h2></div>`;
    live.forEach(m => body += renderMatchCard(m, 'live'));
  }

  if (upcoming.length) {
    body += `<div class="section-head"><h2>Upcoming</h2><span class="count">${upcoming.length} match${upcoming.length>1?'es':''}</span></div>`;
    upcoming.forEach(m => {
      body += `<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;font-weight:600">${formatDatePST(m.utcDate)}</div>`;
      body += renderMatchCard(m, 'upcoming');
    });
  }

  if (completed.length) {
    body += `<div class="section-head"><h2>Results</h2><span class="count">${completed.length} played</span></div>`;
    completed.forEach(m => {
      body += `<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;font-weight:600">${formatDatePST(m.utcDate)}</div>`;
      body += renderMatchCard(m, 'completed');
    });
  }

  if (!teamMatches.length) {
    body += `<div class="loading-spinner">No matches found for ${name}.</div>`;
  }

  modal.innerHTML = `
    <div class="team-modal-header">
      <span class="team-modal-flag">${flag(name)}</span>
      <div style="flex:1">
        <div class="team-modal-title">${name}</div>
        ${grp ? `<div class="team-modal-group" style="cursor:pointer;text-decoration:underline" onclick="goToGroup('${grp}')">Group ${grp} →</div>` : ''}
        ${fifaRank(name) ? `<div class="team-modal-rank">🌍 FIFA Rank #${fifaRank(name)}</div>` : ''}
      </div>
      <button class="fav-btn" onclick="toggleFav('${name.replace(/'/g,"\\'")}');showTeam('${name.replace(/'/g,"\\'")}')" title="Favorite">${isFav(name) ? '★' : '☆'}</button>
      <a class="fav-btn" href="${rosterURL(name)}" target="_blank" rel="noopener" title="Roster &amp; player bios" style="font-size:16px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none">👥</a>
      <button class="fav-btn" onclick="shareTeam('${name.replace(/'/g,"\\'")}')" title="Share" style="font-size:16px">⤴</button>
      <button class="modal-close" onclick="closeTeamModal()">✕</button>
    </div>
    <div class="team-modal-body">${body}</div>`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

let teamSearch = '';

function getAllTeams() {
  // Prefer real names from API matches; fall back to the official draw list
  const names = new Set();
  allMatches.forEach(m => {
    if (m.homeTeam?.name && groupOfTeam(m.homeTeam.name)) names.add(m.homeTeam.name);
    if (m.awayTeam?.name && groupOfTeam(m.awayTeam.name)) names.add(m.awayTeam.name);
  });
  if (names.size === 0) {
    // Canonical list (skip alias spellings)
    const seen = new Set();
    Object.entries(TEAM_GROUPS).forEach(([name, grp]) => {
      const key = grp + ':' + (FLAG_CODES[name] || name);
      if (!seen.has(key)) { seen.add(key); names.add(name); }
    });
  }
  return [...names].sort((a,b) => a.localeCompare(b));
}

function renderTeams() {
  const container = document.getElementById('teams-list');
  const teams = getAllTeams().filter(t =>
    !teamSearch || t.toLowerCase().includes(teamSearch.toLowerCase()));

  const tiles = teams.map(name => `
    <div class="team-tile" data-team="${name.replace(/"/g,'&quot;')}">
      ${flag(name)}

      <span class="team-tile-grp">GRP ${groupOfTeam(name) || '?'}${fifaRank(name) ? ' · #' + fifaRank(name) : ''}</span>

    </div>`).join('');

  container.innerHTML = `
    <input class="teams-search" type="search" placeholder="🔍 Search teams…"
      value="${teamSearch.replace(/"/g,'&quot;')}"
      oninput="teamSearch=this.value;renderTeams();this.focus();this.setSelectionRange(this.value.length,this.value.length)">
    <div class="teams-grid">${tiles}</div>
    ${teams.length === 0 ? '<div class="loading-spinner">No teams match your search.</div>' : ''}`;
}

// ─── ROSTER LINK (Wikipedia 2026 squads page) ────────────────────────────────
function rosterURL(name) {
  // Link to the team's OWN Wikipedia article — always exists and has the current
  // squad + player bios. Most are "{name} national football team"; these few differ
  // (US/Canada/Australia use "men's national soccer team"; a couple have other titles).
  const exact = {
    'United States': "United States men's national soccer team",
    'USA': "United States men's national soccer team",
    'Canada': "Canada men's national soccer team",
    'Australia': "Australia men's national soccer team",
    'Bosnia-Herzegovina': 'Bosnia and Herzegovina national football team',
    'Bosnia and Herzegovina': 'Bosnia and Herzegovina national football team',
    'Czechia': 'Czech Republic national football team',
    'Czech Republic': 'Czech Republic national football team',
    'IR Iran': 'Iran national football team',
    'Korea Republic': 'South Korea national football team'
  };
  const title = exact[name] || (name + ' national football team');
  return 'https://en.wikipedia.org/wiki/' + encodeURIComponent(title.replace(/ /g, '_'));
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{
    timeZone: tz(),hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true
  });
  updateCountdown();
}

function updateCountdown() {
  const el = document.getElementById('nextCountdown');
  if (!el || !nextKickoff) return;
  const diff = nextKickoff - new Date();
  if (diff <= 0) { el.textContent = 'Kicking off…'; return; }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (h >= 24) {
    const d = Math.floor(h / 24);
    el.textContent = `⏱ Kickoff in ${d}d ${h % 24}h ${m}m`;
  } else if (h > 0) {
    el.textContent = `⏱ Kickoff in ${h}h ${m}m ${s}s`;
  } else {
    el.textContent = `⏱ Kickoff in ${m}m ${s}s`;
  }
}
